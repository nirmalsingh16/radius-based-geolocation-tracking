<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>Geofence Tracker</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #060911;
        --s1: #0b0e1a;
        --s2: #101422;
        --s3: #161b2a;
        --border: #1d2236;
        --border2: #252b40;
        --green: #00e676;
        --red: #ff3d5a;
        --amber: #ffab00;
        --blue: #40c4ff;
        --text: #cdd2e8;
        --sub: #8892b0;
        --muted: #3d4460;
        --mono: "JetBrains Mono", monospace;
        --sans: "Inter", sans-serif;
        --r: 8px;
      }
      html,
      body,
      #root {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
      }
      .leaflet-container {
        background: #040609 !important;
      }
      .leaflet-tile {
        filter: brightness(0.3) saturate(0.12) hue-rotate(210deg);
      }
      .leaflet-control-zoom a {
        background: var(--s1) !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
      }
      .leaflet-control-attribution {
        display: none !important;
      }

      /* REGISTRATION */
      .reg-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(4, 6, 9, 0.96);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.4s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .reg-card {
        background: var(--s1);
        border: 1px solid var(--border2);
        border-radius: 20px;
        width: 92%;
        max-width: 400px;
        overflow: hidden;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
        animation: slideUp 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(32px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .reg-hero {
        background: linear-gradient(
          135deg,
          #0d2040 0%,
          #0a1a30 50%,
          #08142a 100%
        );
        padding: 32px 28px 28px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .reg-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 50% 120%,
          rgba(0, 230, 118, 0.12) 0%,
          transparent 65%
        );
      }
      .reg-icon {
        font-size: 52px;
        margin-bottom: 12px;
        filter: drop-shadow(0 0 20px rgba(0, 230, 118, 0.4));
        animation: bob 3s ease-in-out infinite;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      .reg-title {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
        position: relative;
      }
      .reg-sub {
        font-size: 13px;
        color: var(--sub);
        position: relative;
      }
      .reg-zone-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 230, 118, 0.1);
        border: 1px solid rgba(0, 230, 118, 0.25);
        border-radius: 20px;
        padding: 5px 14px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--green);
        margin: 14px auto 0;
        letter-spacing: 0.06em;
        position: relative;
      }
      .reg-zone-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 1.5s ease-out infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.5);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(0, 230, 118, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
        }
      }
      .reg-body {
        padding: 26px 26px 28px;
      }
      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--sub);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 6px;
      }
      .field input {
        width: 100%;
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 11px 14px;
        font-family: var(--sans);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition:
          border 0.15s,
          box-shadow 0.15s;
      }
      .field input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.12);
      }
      .field input::placeholder {
        color: var(--muted);
      }
      .reg-info {
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 12px 14px;
        margin-bottom: 18px;
      }
      .reg-info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 3px 0;
      }
      .reg-info-lbl {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
        text-transform: uppercase;
      }
      .reg-info-val {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
      }
      .reg-btn {
        width: 100%;
        padding: 13px;
        background: var(--green);
        color: #050d07;
        font-family: var(--sans);
        font-weight: 700;
        font-size: 14px;
        border: none;
        border-radius: var(--r);
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.02em;
      }
      .reg-btn:hover:not(:disabled) {
        background: #33ee88;
        box-shadow: 0 8px 24px rgba(0, 230, 118, 0.3);
        transform: translateY(-1px);
      }
      .reg-btn:disabled {
        background: var(--s3);
        color: var(--muted);
        cursor: not-allowed;
      }
      .reg-err {
        color: var(--red);
        font-family: var(--mono);
        font-size: 10px;
        text-align: center;
        margin-top: 10px;
        padding: 8px 12px;
        background: rgba(255, 61, 90, 0.08);
        border: 1px solid rgba(255, 61, 90, 0.2);
        border-radius: 6px;
      }
      .reg-note {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--muted);
        text-align: center;
        margin-top: 12px;
        line-height: 1.7;
      }

      /* LAYOUT */
      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .topbar {
        height: 54px;
        flex-shrink: 0;
        z-index: 500;
        background: var(--s1);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        gap: 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .live-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .live-dot.on {
        background: var(--green);
        animation: sonar 2s ease-out infinite;
      }
      .live-dot.err {
        background: var(--red);
      }
      @keyframes sonar {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.5);
        }
        70% {
          box-shadow: 0 0 0 11px rgba(0, 230, 118, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
        }
      }
      .brand-name {
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
      }
      .brand-sub {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
      }
      .topbar-pills {
        display: flex;
        gap: 6px;
      }
      .tpill {
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 12px;
        text-align: center;
        min-width: 72px;
      }
      .tpill-v {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
      }
      .tpill-l {
        font-size: 8px;
        color: var(--sub);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px 4px 6px;
      }
      .user-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: #000;
        flex-shrink: 0;
      }
      .user-chip-name {
        font-size: 12px;
        font-weight: 500;
        max-width: 100px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .map-area {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      #map {
        width: 100%;
        height: 100%;
      }

      /* STATUS BADGE */
      .status-badge {
        position: absolute;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 700;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 10px 24px;
        border-radius: 30px;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        transition: all 0.4s ease;
        white-space: nowrap;
      }
      .status-badge.wait {
        background: rgba(255, 171, 0, 0.1);
        border: 1.5px solid var(--amber);
        color: var(--amber);
      }
      .status-badge.inside {
        background: rgba(0, 230, 118, 0.1);
        border: 1.5px solid var(--green);
        color: var(--green);
      }
      .status-badge.outside {
        background: rgba(255, 61, 90, 0.1);
        border: 1.5px solid var(--red);
        color: var(--red);
      }
      .sb-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      .sb-dot.pulse {
        animation: sbp 1.2s ease-in-out infinite;
      }
      @keyframes sbp {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }

      /* INFO CARD */
      .info-card {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 700;
        background: var(--s1);
        border: 1px solid var(--border2);
        border-radius: var(--r);
        width: 205px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }
      .ic-hdr {
        padding: 7px 12px;
        border-bottom: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 8px;
        color: var(--sub);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }
      .ic-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 12px;
        border-bottom: 1px solid var(--border);
        font-family: var(--mono);
      }
      .ic-row:last-child {
        border: none;
      }
      .ic-lbl {
        font-size: 8px;
        color: var(--sub);
      }
      .ic-val {
        font-size: 11px;
        font-weight: 600;
      }
      .ic-val.g {
        color: var(--green);
      }
      .ic-val.r {
        color: var(--red);
      }
      .ic-val.a {
        color: var(--amber);
      }
      .ic-val.b {
        color: var(--blue);
      }
      .ic-val.m {
        color: var(--sub);
      }

      /* BUTTONS */
      .sync-btn {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 700;
        background: var(--s1);
        border: 1px solid var(--border2);
        color: var(--sub);
        font-family: var(--mono);
        font-size: 9px;
        padding: 7px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }
      .sync-btn:hover {
        border-color: var(--amber);
        color: var(--amber);
      }
      .recenter-btn {
        position: absolute;
        bottom: 28px;
        right: 12px;
        z-index: 700;
        background: var(--s1);
        border: 1px solid var(--border2);
        color: var(--sub);
        font-family: var(--mono);
        font-size: 10px;
        padding: 8px 13px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .recenter-btn:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      /* CHECK-IN BUTTON */
      .checkin-btn {
        position: absolute;
        bottom: 72px;
        right: 12px;
        z-index: 700;
        background: linear-gradient(135deg, #0a5c2a, #0d7a38);
        border: 2px solid var(--green);
        color: #fff;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        padding: 9px 13px;
        border-radius: 6px;
        cursor: pointer;
        letter-spacing: 0.5px;
        box-shadow: 0 0 14px rgba(0, 230, 118, 0.35);
        transition: all 0.15s;
      }
      .checkin-btn:hover {
        background: linear-gradient(135deg, #0d7a38, #10963f);
        transform: scale(1.04);
        box-shadow: 0 0 22px rgba(0, 230, 118, 0.55);
      }
      .checkin-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      /* CHECK-IN MODAL */
      .ci-overlay {
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        animation: fadeIn 0.2s ease;
      }
      .ci-modal {
        background: var(--s1);
        border: 1px solid var(--border2);
        border-radius: 16px;
        width: 100%;
        max-width: 400px;
        overflow: hidden;
        box-shadow: 0 12px 50px rgba(0, 0, 0, 0.7);
      }
      .ci-modal-hdr {
        background: linear-gradient(135deg, #0a2a15, #0d3b1e);
        padding: 18px 22px 14px;
        border-bottom: 1px solid var(--border);
      }
      .ci-modal-hdr h2 {
        margin: 0 0 4px;
        color: var(--green);
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ci-modal-hdr p {
        color: var(--sub);
        font-size: 11px;
        margin: 0;
        font-family: var(--mono);
      }
      .ci-modal-body {
        padding: 16px 18px 18px;
      }
      .ci-loc-bar {
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
        margin-bottom: 12px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--sub);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ci-loc-bar span {
        color: var(--blue);
      }

      /* Camera zone */
      .ci-cam-zone {
        border: 2px dashed var(--border2);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
        cursor: pointer;
        transition: border-color 0.15s;
        min-height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--s2);
        position: relative;
      }
      .ci-cam-zone:hover {
        border-color: var(--green);
      }
      .ci-cam-zone img {
        width: 100%;
        max-height: 240px;
        object-fit: cover;
        display: block;
      }
      .ci-cam-zone video {
        width: 100%;
        max-height: 240px;
        object-fit: cover;
        display: block;
      }
      .ci-cam-placeholder {
        text-align: center;
        padding: 24px;
        pointer-events: none;
      }
      .ci-cam-placeholder .ci-cam-icon {
        font-size: 36px;
        margin-bottom: 8px;
      }
      .ci-cam-placeholder p {
        font-size: 12px;
        color: var(--sub);
        margin: 0 0 4px;
      }
      .ci-cam-placeholder small {
        font-size: 10px;
        color: var(--muted);
        font-family: var(--mono);
      }

      /* Webcam snap button overlay */
      .ci-snap-overlay {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }
      .ci-snap-btn {
        background: var(--green);
        border: none;
        color: #050d07;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        padding: 8px 20px;
        border-radius: 20px;
        cursor: pointer;
        letter-spacing: 0.05em;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        transition: all 0.15s;
      }
      .ci-snap-btn:hover {
        background: #33ee88;
        transform: scale(1.05);
      }

      /* Upload progress overlay */
      .ci-progress-overlay {
        position: absolute;
        inset: 0;
        background: rgba(6, 9, 17, 0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .ci-progress-bar-wrap {
        width: 80%;
        height: 4px;
        background: var(--border2);
        border-radius: 4px;
        overflow: hidden;
      }
      .ci-progress-bar {
        height: 100%;
        background: var(--green);
        transition: width 0.3s ease;
        border-radius: 4px;
      }
      .ci-progress-text {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--green);
      }

      .ci-retake {
        display: block;
        width: 100%;
        background: transparent;
        border: 1px solid var(--border2);
        color: var(--sub);
        font-family: var(--mono);
        font-size: 9px;
        text-transform: uppercase;
        padding: 6px;
        border-radius: 5px;
        cursor: pointer;
        margin-bottom: 10px;
        transition: all 0.15s;
        letter-spacing: 0.08em;
      }
      .ci-retake:hover {
        border-color: var(--amber);
        color: var(--amber);
      }

      .ci-note {
        width: 100%;
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 12px;
        padding: 9px 12px;
        margin-bottom: 14px;
        resize: none;
        font-family: var(--sans);
        box-sizing: border-box;
        outline: none;
        transition: border 0.15s;
      }
      .ci-note:focus {
        border-color: var(--green);
      }
      .ci-note::placeholder {
        color: var(--muted);
      }
      .ci-actions {
        display: flex;
        gap: 10px;
      }
      .ci-cancel {
        flex: 1;
        background: transparent;
        border: 1px solid var(--border2);
        color: var(--sub);
        font-size: 12px;
        padding: 11px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .ci-cancel:hover {
        border-color: var(--muted);
        color: var(--text);
      }
      .ci-submit {
        flex: 2;
        background: var(--green);
        border: none;
        color: #050d07;
        font-size: 13px;
        font-weight: 700;
        padding: 11px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .ci-submit:hover:not(:disabled) {
        background: #33ee88;
        box-shadow: 0 4px 16px rgba(0, 230, 118, 0.3);
      }
      .ci-submit:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Webcam error */
      .ci-cam-error {
        text-align: center;
        padding: 20px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--red);
        line-height: 1.6;
      }

      /* TOASTS */
      .toasts {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 900;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .toast {
        padding: 8px 20px;
        border-radius: 20px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
        animation:
          tin 0.3s ease-out,
          tout 0.4s ease-in 2.6s forwards;
      }
      .toast.en {
        background: rgba(0, 230, 118, 0.18);
        border: 1px solid var(--green);
        color: var(--green);
      }
      .toast.ex {
        background: rgba(255, 61, 90, 0.18);
        border: 1px solid var(--red);
        color: var(--red);
      }
      @keyframes tin {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes tout {
        to {
          opacity: 0;
          transform: translateY(-6px);
        }
      }

      /* MARKERS */
      .um-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2.5px solid rgba(0, 0, 0, 0.8);
        transition: all 0.4s;
      }
      .um-dot.in {
        background: var(--green);
        box-shadow:
          0 0 0 5px rgba(0, 230, 118, 0.18),
          0 0 20px rgba(0, 230, 118, 0.5);
      }
      .um-dot.out {
        background: var(--red);
        box-shadow:
          0 0 0 5px rgba(255, 61, 90, 0.18),
          0 0 18px rgba(255, 61, 90, 0.5);
      }
      .center-pin {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--amber);
        border: 2.5px solid rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 14px rgba(255, 171, 0, 0.8);
      }

      @media (max-width: 480px) {
        .info-card {
          width: 170px;
        }
        .topbar-pills .tpill:last-child {
          display: none;
        }
        .user-chip-name {
          max-width: 70px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

      const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

      function haversine(la1, lo1, la2, lo2) {
        const R = 6371000,
          r = Math.PI / 180,
          dl = (la2 - la1) * r,
          dn = (lo2 - lo1) * r;
        const a =
          Math.sin(dl / 2) ** 2 +
          Math.cos(la1 * r) * Math.cos(la2 * r) * Math.sin(dn / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }
      function fmtDist(d) {
        return d >= 1000 ? (d / 1000).toFixed(2) + " km" : Math.round(d) + " m";
      }
      function fmtTime() {
        return new Date().toTimeString().slice(0, 8);
      }
      function initials(n) {
        return n
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);
      }
      function avatarColor(n) {
        const h = [
          "#00e676",
          "#40c4ff",
          "#b388ff",
          "#ffab00",
          "#ff6d00",
          "#f48fb1",
        ];
        return h[n.charCodeAt(0) % h.length];
      }

      async function apiFetch(base, path, opts = {}) {
        const r = await fetch(base + path, {
          headers: { "Content-Type": "application/json" },
          ...opts,
          body: opts.body ? JSON.stringify(opts.body) : undefined,
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          throw new Error(e.error || r.statusText);
        }
        return r.json();
      }

      /* ── REGISTRATION ── */
      function RegScreen({ apiBase, onDone }) {
        const [name, setName] = useState("");
        const [email, setEmail] = useState("");
        const [zone, setZone] = useState(null);
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState("");
        const [step, setStep] = useState("form");

        useEffect(() => {
          apiFetch(apiBase, "/api/zones/active/primary")
            .then(setZone)
            .catch(() => {});
        }, [apiBase]);

        async function handleSubmit() {
          if (!name.trim()) return setErr("Please enter your name.");
          if (!email.trim() || !email.includes("@"))
            return setErr("Enter a valid email address.");
          if (!zone) return setErr("No active zone found. Ask admin.");
          setErr("");
          setLoading(true);
          setStep("gps");
          if (!navigator.geolocation) {
            setErr("Geolocation not supported.");
            setLoading(false);
            setStep("form");
            return;
          }
          navigator.geolocation.getCurrentPosition(
            async (pos) => {
              try {
                const sessionId =
                  "sess_" + Math.random().toString(36).slice(2, 10);
                const user = await apiFetch(apiBase, "/api/users/register", {
                  method: "POST",
                  body: {
                    name: name.trim(),
                    email: email.trim().toLowerCase(),
                    sessionId,
                  },
                });
                onDone({ user, zone, sessionId });
              } catch (e) {
                setErr(e.message);
                setStep("form");
                setLoading(false);
              }
            },
            (e) => {
              const msgs = {
                1: "Permission denied.",
                2: "GPS unavailable.",
                3: "GPS timed out.",
              };
              setErr(msgs[e.code] || e.message);
              setStep("form");
              setLoading(false);
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 },
          );
        }

        return (
          <div className="reg-overlay">
            <div className="reg-card">
              <div className="reg-hero">
                <div className="reg-icon">📍</div>
                <div className="reg-title">Geofence Tracker</div>
                <div className="reg-sub">Real-time zone monitoring</div>
                {zone && (
                  <div className="reg-zone-pill">
                    <div className="reg-zone-dot" />
                    {zone.name} · {fmtDist(zone.radius)} radius
                  </div>
                )}
              </div>
              <div className="reg-body">
                {zone && (
                  <div className="reg-info" style={{ marginBottom: 16 }}>
                    <div className="reg-info-row">
                      <span className="reg-info-lbl">Zone center</span>
                      <span
                        className="reg-info-val"
                        style={{ color: "var(--amber)" }}
                      >
                        {zone.lat.toFixed(4)}, {zone.lng.toFixed(4)}
                      </span>
                    </div>
                    <div className="reg-info-row">
                      <span className="reg-info-lbl">Radius</span>
                      <span
                        className="reg-info-val"
                        style={{ color: "var(--green)" }}
                      >
                        {fmtDist(zone.radius)}
                      </span>
                    </div>
                  </div>
                )}
                {step === "gps" ? (
                  <div style={{ textAlign: "center", padding: "20px 0" }}>
                    <div
                      style={{
                        fontSize: 36,
                        marginBottom: 12,
                        animation: "bob 1.5s ease-in-out infinite",
                      }}
                    >
                      🛰
                    </div>
                    <div
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 11,
                        color: "var(--sub)",
                      }}
                    >
                      Requesting location permission…
                    </div>
                    <div
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 9,
                        color: "var(--muted)",
                        marginTop: 8,
                      }}
                    >
                      Click <strong>Allow</strong> in the browser prompt
                    </div>
                  </div>
                ) : (
                  <>
                    <div className="field">
                      <label>Your Name</label>
                      <input
                        value={name}
                        onChange={(e) => setName(e.target.value)}
                        placeholder="John Doe"
                        onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                      />
                    </div>
                    <div className="field">
                      <label>Email Address</label>
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        placeholder="john@example.com"
                        onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                      />
                    </div>
                    <button
                      className="reg-btn"
                      onClick={handleSubmit}
                      disabled={loading || !zone}
                    >
                      {loading
                        ? "Connecting…"
                        : zone
                          ? "Allow Location & Track Me"
                          : "Waiting for zone…"}
                    </button>
                    {err && <div className="reg-err">⚠ {err}</div>}
                    <div className="reg-note">
                      You'll receive email alerts when entering
                      <br />
                      or leaving the geofence zone.
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      /* ── WEBCAM COMPONENT (Desktop only) ── */
      function WebcamCapture({ onCapture, onError }) {
        const videoRef = useRef(null);
        const streamRef = useRef(null);
        const [ready, setReady] = useState(false);
        const [error, setError] = useState(null);

        useEffect(() => {
          let cancelled = false;
          navigator.mediaDevices
            .getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then((stream) => {
              if (cancelled) {
                stream.getTracks().forEach((t) => t.stop());
                return;
              }
              streamRef.current = stream;
              if (videoRef.current) {
                videoRef.current.srcObject = stream;
                videoRef.current.play();
                setReady(true);
              }
            })
            .catch((err) => {
              const msg =
                err.name === "NotAllowedError"
                  ? "Camera access denied. Please allow camera in your browser settings."
                  : err.name === "NotFoundError"
                    ? "No camera found on this device."
                    : "Could not open camera: " + err.message;
              setError(msg);
              if (onError) onError(msg);
            });
          return () => {
            cancelled = true;
            if (streamRef.current)
              streamRef.current.getTracks().forEach((t) => t.stop());
          };
        }, []);

        function snap() {
          const video = videoRef.current;
          if (!video || !ready) return;
          const canvas = document.createElement("canvas");
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext("2d").drawImage(video, 0, 0);
          canvas.toBlob(
            (blob) => {
              const file = new File([blob], "webcam-checkin.jpg", {
                type: "image/jpeg",
              });
              onCapture(file, canvas.toDataURL("image/jpeg", 0.92));
              // Stop stream after capture
              if (streamRef.current)
                streamRef.current.getTracks().forEach((t) => t.stop());
            },
            "image/jpeg",
            0.92,
          );
        }

        if (error) {
          return (
            <div className="ci-cam-error">
              ⚠ {error}
              <br />
              <br />
              <small style={{ color: "var(--muted)" }}>
                You can still upload a photo using the file picker below.
              </small>
            </div>
          );
        }

        return (
          <div style={{ position: "relative", width: "100%" }}>
            <video
              ref={videoRef}
              playsInline
              muted
              style={{
                width: "100%",
                maxHeight: 240,
                objectFit: "cover",
                display: "block",
                borderRadius: 8,
              }}
            />
            {!ready && (
              <div
                style={{
                  position: "absolute",
                  inset: 0,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontFamily: "var(--mono)",
                  fontSize: 10,
                  color: "var(--sub)",
                }}
              >
                Starting camera…
              </div>
            )}
            {ready && (
              <div className="ci-snap-overlay">
                <button className="ci-snap-btn" onClick={snap}>
                  📸 Snap Photo
                </button>
              </div>
            )}
          </div>
        );
      }

      /* ── TRACKER ── */
      function Tracker({ apiBase, session }) {
        const { user, zone } = session;
        const mapRef = useRef(null),
          leafletRef = useRef(null),
          circleRef = useRef(null),
          markerRef = useRef(null),
          accRef = useRef(null),
          trailRef = useRef(null),
          trailPts = useRef([]),
          watchRef = useRef(null);

        const [pos, setPos] = useState(null);
        const [dist, setDist] = useState(null);
        const [inside, setInside] = useState(null);
        const [accuracy, setAcc] = useState(null);
        const [time, setTime] = useState("—");
        const [gpsOn, setGpsOn] = useState(false);
        const [gpsErr, setGpsErr] = useState(false);
        const [toasts, setToasts] = useState([]);
        const [activeZone, setActiveZone] = useState(zone);
        const wasInsideRef = useRef(null);

        // Check-in state
        const [ciOpen, setCiOpen] = useState(false);
        const [ciImage, setCiImage] = useState(null);
        const [ciPreview, setCiPreview] = useState(null);
        const [ciNote, setCiNote] = useState("");
        const [ciSending, setCiSending] = useState(false);
        const [ciProgress, setCiProgress] = useState(0);
        const [ciMode, setCiMode] = useState("camera"); // "camera" | "preview"
        const [ciWebcamError, setCiWebcamError] = useState(false);
        const ciFileRef = useRef(null);

        /* Init map */
        useEffect(() => {
          const L = window.L;
          const map = L.map(mapRef.current, {
            zoomControl: true,
            attributionControl: false,
            tap: true,
          }).setView([zone.lat, zone.lng], 14);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
          }).addTo(map);
          leafletRef.current = map;
          const cIcon = L.divIcon({
            className: "",
            iconSize: [14, 14],
            iconAnchor: [7, 7],
            html: '<div class="center-pin"></div>',
          });
          L.marker([zone.lat, zone.lng], { icon: cIcon, zIndexOffset: 100 })
            .bindTooltip(
              `<span style="font-family:JetBrains Mono,monospace;font-size:10px">${zone.name}<br>Center</span>`,
              { direction: "top" },
            )
            .addTo(map);
          circleRef.current = L.circle([zone.lat, zone.lng], {
            radius: zone.radius,
            color: "#00e676",
            fillColor: "#00e676",
            fillOpacity: 0.05,
            weight: 1.5,
            dashArray: "6 4",
          }).addTo(map);
          trailRef.current = L.polyline([], {
            color: "#40c4ff",
            weight: 2,
            opacity: 0.45,
            dashArray: "4 3",
          }).addTo(map);
          return () => {
            map.remove();
            if (watchRef.current)
              navigator.geolocation.clearWatch(watchRef.current);
          };
        }, []);

        useEffect(() => {
          watchRef.current = navigator.geolocation.watchPosition(
            (pos) => handlePos(pos),
            () => {
              setGpsErr(true);
              setGpsOn(false);
            },
            { enableHighAccuracy: true, maximumAge: 2000, timeout: 20000 },
          );
          return () => navigator.geolocation.clearWatch(watchRef.current);
        }, [activeZone]);

        useEffect(() => {
          const t = setInterval(async () => {
            try {
              const z = await apiFetch(apiBase, "/api/zones/active/primary");
              setActiveZone(z);
              if (circleRef.current) {
                circleRef.current.setLatLng([z.lat, z.lng]);
                circleRef.current.setRadius(z.radius);
              }
            } catch {}
          }, 30000);
          return () => clearInterval(t);
        }, [apiBase]);

        const handlePos = useCallback(
          async (position) => {
            const {
              latitude: lat,
              longitude: lng,
              accuracy: acc,
            } = position.coords;
            const L = window.L;
            setGpsOn(true);
            setGpsErr(false);
            setPos([lat, lng]);
            setAcc(acc);
            setTime(fmtTime());
            const z = activeZone;
            const d = haversine(z.lat, z.lng, lat, lng);
            const ins = d <= z.radius;
            setDist(d);
            setInside(ins);
            const uIcon = L.divIcon({
              className: "",
              iconSize: [18, 18],
              iconAnchor: [9, 9],
              html: `<div class="um-dot ${ins ? "in" : "out"}"></div>`,
            });
            if (!markerRef.current) {
              markerRef.current = L.marker([lat, lng], {
                icon: uIcon,
                zIndexOffset: 200,
              })
                .bindTooltip("", {
                  permanent: true,
                  direction: "top",
                  offset: [0, -10],
                })
                .addTo(leafletRef.current);
              leafletRef.current.fitBounds(
                L.latLngBounds([
                  [z.lat, z.lng],
                  [lat, lng],
                ]).pad(0.35),
              );
            } else {
              markerRef.current.setLatLng([lat, lng]);
              markerRef.current.setIcon(uIcon);
            }
            markerRef.current.setTooltipContent(
              `<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:${ins ? "#00e676" : "#ff3d5a"}">${ins ? "▲ Inside" : "▼ Outside"} · ${fmtDist(d)}</span>`,
            );
            if (accRef.current) {
              leafletRef.current.removeLayer(accRef.current);
              accRef.current = null;
            }
            if (acc > 0) {
              accRef.current = L.circle([lat, lng], {
                radius: acc,
                color: "#40c4ff",
                fillColor: "#40c4ff",
                fillOpacity: 0.05,
                weight: 0.7,
                dashArray: "3 3",
              }).addTo(leafletRef.current);
            }
            trailPts.current.push([lat, lng]);
            if (trailPts.current.length > 500) trailPts.current.shift();
            trailRef.current.setLatLngs(trailPts.current);
            if (wasInsideRef.current !== null && wasInsideRef.current !== ins) {
              addToast(
                ins ? "▲ Entered zone!" : "▼ Left zone!",
                ins ? "en" : "ex",
              );
              flashCircle(ins);
            }
            wasInsideRef.current = ins;
            try {
              await apiFetch(apiBase, "/api/users/location", {
                method: "POST",
                body: {
                  userId: user._id,
                  lat,
                  lng,
                  accuracy: acc,
                  zoneId: z._id,
                  isInside: ins,
                  distanceToCenter: d,
                },
              });
            } catch {}
          },
          [activeZone, apiBase, user],
        );

        function addToast(msg, type) {
          const id = Date.now();
          setToasts((p) => [...p, { id, msg, type }]);
          setTimeout(
            () => setToasts((p) => p.filter((t) => t.id !== id)),
            3200,
          );
        }
        function flashCircle(ins) {
          const c = ins ? "#00e676" : "#ff3d5a";
          circleRef.current?.setStyle({
            color: c,
            fillColor: c,
            fillOpacity: 0.15,
            weight: 2.5,
          });
          setTimeout(
            () =>
              circleRef.current?.setStyle({
                color: "#00e676",
                fillColor: "#00e676",
                fillOpacity: 0.05,
                weight: 1.5,
              }),
            1400,
          );
        }
        function goToMe() {
          if (pos) leafletRef.current?.setView(pos, 16);
        }

        /* ── Check-in helpers ── */
        function openCi() {
          setCiOpen(true);
          setCiImage(null);
          setCiPreview(null);
          setCiNote("");
          setCiProgress(0);
          setCiMode("camera");
          setCiWebcamError(false);

          if (isMobile) {
            // On mobile, immediately trigger the file input with camera capture
            setTimeout(() => ciFileRef.current?.click(), 150);
          }
          // On desktop, WebcamCapture component handles camera automatically
        }

        function closeCi() {
          setCiOpen(false);
          setCiImage(null);
          setCiPreview(null);
          setCiNote("");
          setCiProgress(0);
          setCiMode("camera");
          setCiWebcamError(false);
        }

        // Called by WebcamCapture after snap (desktop)
        function onWebcamCapture(file, previewDataUrl) {
          setCiImage(file);
          setCiPreview(previewDataUrl);
          setCiMode("preview");
        }

        // Called when webcam fails on desktop — fall back to file picker
        function onWebcamError() {
          setCiWebcamError(true);
        }

        function retake() {
          setCiImage(null);
          setCiPreview(null);
          setCiMode("camera");
          setCiWebcamError(false);
          if (isMobile) {
            setTimeout(() => ciFileRef.current?.click(), 100);
          }
        }

        // File input change (mobile camera / desktop fallback file picker)
        function onCiFile(e) {
          const file = e.target.files[0];
          if (!file) return;
          if (!file.type.startsWith("image/")) {
            addToast("Please select an image file", "ex");
            return;
          }
          setCiImage(file);
          const reader = new FileReader();
          reader.onload = (ev) => {
            setCiPreview(ev.target.result);
            setCiMode("preview");
          };
          reader.readAsDataURL(file);
          e.target.value = "";
        }

        async function submitCi() {
          if (!ciImage) {
            addToast("Please take a photo first", "ex");
            return;
          }
          if (!pos) {
            addToast("GPS not ready yet", "ex");
            return;
          }
          setCiSending(true);
          setCiProgress(10);
          try {
            const fd = new FormData();
            fd.append("image", ciImage);
            fd.append("lat", pos[0]);
            fd.append("lng", pos[1]);
            fd.append("note", ciNote);
            fd.append("accuracy", accuracy || 0);
            if (user?._id) fd.append("userId", user._id);
            if (user?.name) fd.append("userName", user.name);
            if (user?.email) fd.append("userEmail", user.email);
            setCiProgress(30);
            const result = await new Promise((resolve, reject) => {
              const xhr = new XMLHttpRequest();
              xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                  const pct = Math.round((e.loaded / e.total) * 70) + 20;
                  setCiProgress(Math.min(pct, 90));
                }
              };
              xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                  try {
                    resolve(JSON.parse(xhr.responseText));
                  } catch {
                    resolve({ success: true });
                  }
                } else {
                  try {
                    reject(
                      new Error(
                        JSON.parse(xhr.responseText).error || "Upload failed",
                      ),
                    );
                  } catch {
                    reject(new Error("Upload failed (" + xhr.status + ")"));
                  }
                }
              };
              xhr.onerror = () =>
                reject(new Error("Network error — check server connection"));
              xhr.open("POST", apiBase + "/api/checkin");
              xhr.send(fd);
            });
            setCiProgress(100);
            setTimeout(() => {
              addToast("✅ Check-in submitted!", "en");
              closeCi();
            }, 400);
          } catch (e) {
            addToast("Check-in failed: " + e.message, "ex");
            setCiProgress(0);
          } finally {
            setCiSending(false);
          }
        }

        const badgeCls =
          inside === null ? "wait" : inside ? "inside" : "outside";
        const badgeText =
          inside === null
            ? "Acquiring GPS…"
            : inside
              ? `Inside zone · ${fmtDist(dist)} from center`
              : `Outside zone · ${fmtDist(dist)} from center`;

        return (
          <div className="app">
            <div className="topbar">
              <div className="brand">
                <div
                  className={`live-dot ${gpsOn ? "on" : ""}${gpsErr ? " err" : ""}`}
                />
                <div>
                  <div className="brand-name">Geofence Tracker</div>
                  <div className="brand-sub">
                    {gpsOn
                      ? `Live · ${time}`
                      : gpsErr
                        ? "GPS error"
                        : "Waiting for GPS…"}
                  </div>
                </div>
              </div>
              <div className="topbar-pills">
                <div className="tpill">
                  <div
                    className="tpill-v"
                    style={{
                      color:
                        inside === null
                          ? "var(--amber)"
                          : inside
                            ? "var(--green)"
                            : "var(--red)",
                    }}
                  >
                    {inside === null ? "—" : inside ? "IN" : "OUT"}
                  </div>
                  <div className="tpill-l">Status</div>
                </div>
                <div className="tpill">
                  <div className="tpill-v" style={{ color: "var(--blue)" }}>
                    {dist !== null ? fmtDist(dist) : "—"}
                  </div>
                  <div className="tpill-l">Distance</div>
                </div>
              </div>
              <div className="user-chip">
                <div
                  className="user-avatar"
                  style={{ background: avatarColor(user.name) }}
                >
                  {initials(user.name)}
                </div>
                <span className="user-chip-name">{user.name}</span>
              </div>
            </div>

            <div className="map-area">
              <div
                id="map"
                ref={mapRef}
                style={{ width: "100%", height: "100%" }}
              />

              <div className="toasts">
                {toasts.map((t) => (
                  <div key={t.id} className={`toast ${t.type}`}>
                    {t.msg}
                  </div>
                ))}
              </div>

              <button
                className="sync-btn"
                onClick={async () => {
                  try {
                    const z = await apiFetch(
                      apiBase,
                      "/api/zones/active/primary",
                    );
                    setActiveZone(z);
                    addToast("Zone synced", "en");
                  } catch {}
                }}
              >
                ⟳ Sync Zone
              </button>

              <div className="info-card">
                <div className="ic-hdr">{activeZone.name}</div>
                <div className="ic-row">
                  <span className="ic-lbl">Latitude</span>
                  <span className="ic-val b">
                    {pos ? pos[0].toFixed(6) : "—"}
                  </span>
                </div>
                <div className="ic-row">
                  <span className="ic-lbl">Longitude</span>
                  <span className="ic-val b">
                    {pos ? pos[1].toFixed(6) : "—"}
                  </span>
                </div>
                <div className="ic-row">
                  <span className="ic-lbl">GPS Accuracy</span>
                  <span className="ic-val a">
                    {accuracy !== null
                      ? "±" + Math.round(accuracy) + " m"
                      : "—"}
                  </span>
                </div>
                <div className="ic-row">
                  <span className="ic-lbl">Distance</span>
                  <span className={`ic-val ${inside ? "g" : "r"}`}>
                    {dist !== null ? fmtDist(dist) : "—"}
                  </span>
                </div>
                <div className="ic-row">
                  <span className="ic-lbl">Zone radius</span>
                  <span className="ic-val g">{fmtDist(activeZone.radius)}</span>
                </div>
                <div className="ic-row">
                  <span className="ic-lbl">Updated</span>
                  <span className="ic-val m">{time}</span>
                </div>
              </div>

              <div className={`status-badge ${badgeCls}`}>
                <div className={`sb-dot ${inside === null ? "pulse" : ""}`} />
                {badgeText}
              </div>

              <button className="recenter-btn" onClick={goToMe}>
                ⊙ Me
              </button>

              <button
                className="checkin-btn"
                onClick={openCi}
                disabled={!pos}
                title={
                  !pos ? "Waiting for GPS…" : "Tap to open camera & check in"
                }
              >
                📸 Check In
              </button>

              {/* ── Check-in Modal ── */}
              {ciOpen && (
                <div
                  className="ci-overlay"
                  onClick={(e) =>
                    e.target === e.currentTarget && !ciSending && closeCi()
                  }
                >
                  <div className="ci-modal">
                    <div className="ci-modal-hdr">
                      <h2>📸 Zone Check-In</h2>
                      <p>Take a photo to record your presence</p>
                    </div>
                    <div className="ci-modal-body">
                      <div className="ci-loc-bar">
                        📍{" "}
                        <span>
                          {pos
                            ? `${pos[0].toFixed(5)}, ${pos[1].toFixed(5)}`
                            : "Waiting…"}
                        </span>
                        &nbsp;·&nbsp;
                        {dist !== null ? fmtDist(dist) + " from center" : "—"}
                      </div>

                      {/* Hidden file input — mobile: opens camera; desktop fallback: file picker */}
                      <input
                        ref={ciFileRef}
                        type="file"
                        accept="image/*"
                        capture={isMobile ? "environment" : undefined}
                        style={{ display: "none" }}
                        onChange={onCiFile}
                      />

                      {/* Camera / preview zone */}
                      <div
                        className="ci-cam-zone"
                        style={{
                          cursor:
                            ciMode === "preview" && !ciSending
                              ? "pointer"
                              : "default",
                        }}
                        onClick={() =>
                          ciMode === "preview" && !ciSending && retake()
                        }
                      >
                        {ciMode === "preview" && ciPreview ? (
                          <>
                            <img src={ciPreview} alt="preview" />
                            {ciSending && (
                              <div className="ci-progress-overlay">
                                <div className="ci-progress-text">
                                  Uploading… {ciProgress}%
                                </div>
                                <div className="ci-progress-bar-wrap">
                                  <div
                                    className="ci-progress-bar"
                                    style={{ width: ciProgress + "%" }}
                                  />
                                </div>
                              </div>
                            )}
                          </>
                        ) : ciMode === "camera" && !isMobile ? (
                          /* Desktop: live webcam stream */
                          <WebcamCapture
                            onCapture={onWebcamCapture}
                            onError={onWebcamError}
                          />
                        ) : (
                          /* Mobile: placeholder (file input triggers immediately on open) */
                          <div className="ci-cam-placeholder">
                            <div className="ci-cam-icon">📷</div>
                            <p>Opening camera…</p>
                            <small>
                              Photo saved with location &amp; timestamp
                            </small>
                          </div>
                        )}
                      </div>

                      {/* Retake / fallback buttons */}
                      {ciMode === "preview" && !ciSending && (
                        <button className="ci-retake" onClick={retake}>
                          ↩ Retake Photo
                        </button>
                      )}
                      {ciMode === "camera" && !isMobile && ciWebcamError && (
                        <button
                          className="ci-retake"
                          onClick={() => ciFileRef.current?.click()}
                        >
                          📁 Choose from Files Instead
                        </button>
                      )}
                      {ciMode === "camera" && !isMobile && !ciWebcamError && (
                        <button
                          className="ci-retake"
                          style={{ marginBottom: 10 }}
                          onClick={() => ciFileRef.current?.click()}
                        >
                          📁 Upload from Files Instead
                        </button>
                      )}

                      <textarea
                        className="ci-note"
                        rows={2}
                        placeholder="Optional note… (e.g. 'Morning shift started')"
                        value={ciNote}
                        onChange={(e) => setCiNote(e.target.value)}
                        disabled={ciSending}
                      />

                      <div className="ci-actions">
                        <button
                          className="ci-cancel"
                          onClick={closeCi}
                          disabled={ciSending}
                        >
                          Cancel
                        </button>
                        <button
                          className="ci-submit"
                          onClick={submitCi}
                          disabled={ciSending || !ciImage || !pos}
                        >
                          {ciSending ? (
                            <>⏳ Uploading {ciProgress}%…</>
                          ) : (
                            <>✅ Submit Check-In</>
                          )}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      function App() {
        const [apiBase] = useState(
          "https://radius-based-geolocation-tracking.onrender.com",
        );
        const [session, setSession] = useState(null);
        return session ? (
          <Tracker apiBase={apiBase} session={session} />
        ) : (
          <RegScreen apiBase={apiBase} onDone={setSession} />
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
