<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GeoAdmin — Control Panel</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #050810;
        --s1: #090c18;
        --s2: #0e111e;
        --s3: #131624;
        --border: #1a1e30;
        --border2: #222640;
        --cyan: #00bcd4;
        --green: #00e676;
        --red: #ff3d5a;
        --amber: #ffab00;
        --purple: #b388ff;
        --blue: #40c4ff;
        --text: #c8cde0;
        --sub: #7a8099;
        --muted: #2e3350;
        --mono: "JetBrains Mono", monospace;
        --sans: "Inter", sans-serif;
        --r: 8px;
      }
      html,
      body,
      #root {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
      }

      /* LAYOUT */
      .shell {
        display: grid;
        grid-template-rows: 54px 1fr;
        grid-template-columns: 320px 1fr;
        height: 100vh;
      }
      .topbar {
        grid-column: 1/-1;
        background: var(--s1);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        gap: 16px;
        z-index: 100;
      }
      .sidebar {
        background: var(--s1);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .sidebar::-webkit-scrollbar {
        width: 3px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: var(--border);
      }
      .main-area {
        display: grid;
        grid-template-rows: 1fr 220px;
        overflow: hidden;
        position: relative;
      }

      /* TOPBAR */
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-logo {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, var(--cyan), var(--purple));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .brand-name {
        font-weight: 800;
        font-size: 14px;
        color: #fff;
        letter-spacing: 0.03em;
      }
      .brand-tag {
        font-family: var(--mono);
        font-size: 8px;
        color: var(--sub);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .api-row {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .api-inp {
        background: var(--s2);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 5px 10px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text);
        outline: none;
        width: 185px;
        transition: border 0.15s;
      }
      .api-inp:focus {
        border-color: var(--cyan);
      }
      .api-lbl {
        font-size: 10px;
        color: var(--sub);
        white-space: nowrap;
      }
      .conn-btn {
        background: var(--s2);
        border: 1px solid var(--border2);
        color: var(--sub);
        font-family: var(--mono);
        font-size: 9px;
        text-transform: uppercase;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .conn-btn:hover {
        border-color: var(--cyan);
        color: var(--cyan);
      }
      .stat-pills {
        display: flex;
        gap: 6px;
      }
      .spill {
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 12px;
        text-align: center;
        min-width: 72px;
      }
      .spill-v {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
      }
      .spill-l {
        font-size: 8px;
        color: var(--sub);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .conn-status {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .conn-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .conn-dot.on {
        background: var(--green);
        animation: sonar 2s ease-out infinite;
      }
      .conn-dot.err {
        background: var(--red);
      }
      @keyframes sonar {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.5);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(0, 230, 118, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
        }
      }
      .conn-lbl {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
      }

      /* SIDEBAR */
      .sb-sec {
        border-bottom: 1px solid var(--border);
      }
      .sb-sec-hdr {
        padding: 11px 14px;
        font-family: var(--mono);
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--sub);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .sb-sec-badge {
        background: var(--s3);
        border: 1px solid var(--border);
        border-radius: 3px;
        font-size: 9px;
        padding: 1px 7px;
        color: var(--cyan);
      }
      .sb-body {
        padding: 12px 14px;
      }

      /* Tab switcher inside sidebar section */
      .zone-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin: 0 -14px;
        padding: 0 14px;
      }
      .ztab {
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 7px 10px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .ztab.active {
        border-bottom-color: var(--cyan);
        color: var(--cyan);
      }

      /* Form */
      .fld {
        margin-bottom: 11px;
      }
      .fld label {
        display: block;
        font-family: var(--mono);
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--sub);
        margin-bottom: 5px;
      }
      .fld input,
      .fld select,
      .fld textarea {
        width: 100%;
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text);
        outline: none;
        transition: border 0.15s;
      }
      .fld input:focus,
      .fld select:focus,
      .fld textarea:focus {
        border-color: var(--cyan);
      }
      .fld textarea {
        resize: vertical;
        min-height: 64px;
        font-size: 10px;
      }
      .fld-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .btn {
        width: 100%;
        padding: 9px;
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border: none;
        cursor: pointer;
        transition: all 0.15s;
        margin-bottom: 5px;
      }
      .btn-primary {
        background: var(--cyan);
        color: #000;
      }
      .btn-primary:hover {
        background: #33d6e8;
        box-shadow: 0 0 18px rgba(0, 188, 212, 0.3);
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border2);
        color: var(--sub);
      }
      .btn-ghost:hover {
        border-color: var(--cyan);
        color: var(--cyan);
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 8px;
        width: auto;
        margin: 0;
      }
      .btn-danger {
        background: transparent;
        border: 1px solid var(--red);
        color: var(--red);
      }
      .btn-danger:hover {
        background: rgba(255, 61, 90, 0.08);
      }
      .btn-amber {
        background: transparent;
        border: 1px solid var(--amber);
        color: var(--amber);
      }
      .btn-amber:hover {
        background: rgba(255, 171, 0, 0.08);
      }
      .pick-hint {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Pincode tags input */
      .pc-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 8px;
        min-height: 28px;
      }
      .pc-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: rgba(0, 188, 212, 0.1);
        border: 1px solid rgba(0, 188, 212, 0.3);
        border-radius: 20px;
        padding: 2px 10px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--cyan);
      }
      .pc-tag button {
        background: none;
        border: none;
        color: var(--cyan);
        cursor: pointer;
        font-size: 11px;
        padding: 0;
        line-height: 1;
        opacity: 0.7;
      }
      .pc-tag button:hover {
        opacity: 1;
      }
      .pc-resolve-btn {
        width: 100%;
        padding: 7px;
        background: rgba(0, 188, 212, 0.08);
        border: 1px solid rgba(0, 188, 212, 0.25);
        border-radius: 6px;
        color: var(--cyan);
        font-family: var(--mono);
        font-size: 9px;
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      .pc-resolve-btn:hover {
        background: rgba(0, 188, 212, 0.16);
      }
      .pc-resolve-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .pc-status {
        font-family: var(--mono);
        font-size: 9px;
        padding: 5px 8px;
        border-radius: 5px;
        margin-bottom: 8px;
      }
      .pc-status.ok {
        background: rgba(0, 230, 118, 0.08);
        border: 1px solid rgba(0, 230, 118, 0.2);
        color: var(--green);
      }
      .pc-status.err {
        background: rgba(255, 61, 90, 0.08);
        border: 1px solid rgba(255, 61, 90, 0.2);
        color: var(--red);
      }
      .pc-status.loading {
        background: rgba(255, 171, 0, 0.08);
        border: 1px solid rgba(255, 171, 0, 0.2);
        color: var(--amber);
      }

      /* Zone list */
      .zone-item {
        background: var(--s2);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 10px 12px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .zone-item:hover,
      .zone-item.sel {
        border-color: var(--cyan);
      }
      .zone-item.sel {
        background: rgba(0, 188, 212, 0.04);
      }
      .zi-name {
        font-weight: 600;
        font-size: 12px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
      }
      .zi-badge {
        font-family: var(--mono);
        font-size: 7px;
        padding: 1px 6px;
        border-radius: 2px;
      }
      .zi-on {
        background: rgba(0, 230, 118, 0.1);
        color: var(--green);
        border: 1px solid rgba(0, 230, 118, 0.25);
      }
      .zi-off {
        background: rgba(255, 61, 90, 0.08);
        color: var(--red);
        border: 1px solid rgba(255, 61, 90, 0.2);
      }
      .zi-pc {
        background: rgba(0, 188, 212, 0.1);
        color: var(--cyan);
        border: 1px solid rgba(0, 188, 212, 0.25);
      }
      .zi-meta {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .zi-acts {
        display: flex;
        gap: 4px;
        margin-top: 7px;
      }

      /* User list */
      .user-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 0;
        border-bottom: 1px solid var(--border);
      }
      .user-item:last-child {
        border: none;
      }
      .u-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .u-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        border: 1.5px solid var(--border2);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: #000;
        overflow: hidden;
      }
      .u-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      .u-name {
        font-size: 12px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .u-email {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 120px;
      }
      .u-pincode {
        font-family: var(--mono);
        font-size: 8px;
        color: var(--amber);
        margin-top: 1px;
      }
      .u-status {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
      }

      /* Pincode admin panel */
      .pc-admin-panel {
        background: var(--s2);
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
      }
      .pc-admin-title {
        font-family: var(--mono);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--cyan);
        margin-bottom: 8px;
      }
      .pc-user-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        border-bottom: 1px solid var(--border);
      }
      .pc-user-row:last-child {
        border: none;
      }
      .pc-user-name {
        font-size: 11px;
        font-weight: 500;
        flex: 1;
      }
      .pc-user-pin {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--amber);
      }
      .pc-user-status {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
      }

      /* MAP */
      .map-wrap {
        position: relative;
        overflow: hidden;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .leaflet-container {
        background: #030508 !important;
      }

      /* ── POLYGON DRAWING STYLES ── */
      .poly-coord-area {
        width: 100%;
        font-family: var(--mono);
        font-size: 9px;
        background: var(--s3);
        border: 1px solid var(--border2);
        border-radius: 6px;
        color: var(--text);
        padding: 8px;
        resize: vertical;
        min-height: 80px;
        margin-bottom: 6px;
      }
      .poly-coord-area:focus {
        outline: none;
        border-color: var(--purple);
      }
      .poly-draw-btn {
        width: 100%;
        padding: 7px;
        background: rgba(179, 136, 255, 0.08);
        border: 1px solid rgba(179, 136, 255, 0.3);
        border-radius: 6px;
        color: var(--purple);
        font-family: var(--mono);
        font-size: 9px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
        transition: all 0.15s;
      }
      .poly-draw-btn:hover {
        background: rgba(179, 136, 255, 0.16);
      }
      .poly-draw-btn.active {
        background: rgba(179, 136, 255, 0.25);
        border-color: var(--purple);
        color: #fff;
      }
      .poly-draw-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .poly-vertex-count {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--purple);
        margin-bottom: 6px;
        text-align: center;
      }
      .poly-hint {
        font-family: var(--mono);
        font-size: 8px;
        color: var(--sub);
        background: rgba(179, 136, 255, 0.06);
        border: 1px solid rgba(179, 136, 255, 0.15);
        border-radius: 4px;
        padding: 5px 8px;
        margin-bottom: 8px;
        line-height: 1.5;
      }

      /* ── USER PROFILE POPUP (Leaflet) ── */
      .leaflet-popup-content-wrapper {
        background: #0e111e !important;
        border: 1px solid #222640 !important;
        border-radius: 10px !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7) !important;
        padding: 0 !important;
      }
      .leaflet-popup-content {
        margin: 0 !important;
        width: auto !important;
      }
      .leaflet-popup-tip {
        background: #0e111e !important;
      }
      .leaflet-popup-close-button {
        color: #7a8099 !important;
        font-size: 16px !important;
        top: 6px !important;
        right: 8px !important;
      }
      .user-popup {
        min-width: 200px;
        padding: 14px;
        font-family: var(--sans);
      }
      .user-popup-avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        color: #000;
        margin: 0 auto 10px;
        overflow: hidden;
        border: 2px solid var(--border2);
      }
      .user-popup-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .user-popup-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        text-align: center;
        margin-bottom: 2px;
      }
      .user-popup-email {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
        text-align: center;
        margin-bottom: 8px;
        word-break: break-all;
      }
      .user-popup-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
        padding: 3px 0;
        border-top: 1px solid var(--border);
      }
      .user-popup-row span:last-child {
        color: var(--text);
        text-align: right;
      }

      /* ── ZONE LIST POLYGON BADGE ── */
      .zi-badge.zi-poly {
        background: rgba(179, 136, 255, 0.15);
        border: 1px solid rgba(179, 136, 255, 0.3);
        color: var(--purple);
      }

      /* ── PINCODE DISTRICT INFO ── */
      .pc-district-badge {
        font-family: var(--mono);
        font-size: 8px;
        color: var(--amber);
        background: rgba(255, 171, 0, 0.07);
        border: 1px solid rgba(255, 171, 0, 0.2);
        border-radius: 10px;
        padding: 1px 7px;
        display: inline-block;
        margin-top: 3px;
      }
      .pc-area-line {
        font-family: var(--mono);
        font-size: 8px;
        color: var(--sub);
        margin-top: 2px;
      }

      .leaflet-tile {
        filter: brightness(0.28) saturate(0.1) hue-rotate(210deg);
      }
      .leaflet-control-zoom a {
        background: var(--s1) !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
      }
      .leaflet-control-attribution {
        display: none !important;
      }
      .map-hint {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 700;
        background: rgba(9, 12, 24, 0.8);
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 6px 16px;
        font-family: var(--mono);
        font-size: 9px;
        color: var(--sub);
        pointer-events: none;
        white-space: nowrap;
      }

      /* EVENTS TABLE */
      .events-panel {
        background: var(--s1);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .ep-hdr {
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .ep-scroll {
        flex: 1;
        overflow-y: auto;
      }
      .ep-scroll::-webkit-scrollbar {
        width: 3px;
      }
      .ep-scroll::-webkit-scrollbar-thumb {
        background: var(--border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        font-family: var(--mono);
        font-size: 7px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        padding: 5px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--s1);
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
      }
      tbody tr:hover {
        background: var(--s2);
      }
      tbody td {
        font-family: var(--mono);
        font-size: 9px;
        padding: 5px 12px;
        color: var(--text);
      }
      .ev-enter {
        color: var(--green);
      }
      .ev-exit {
        color: var(--red);
      }
      .ev-info {
        color: var(--amber);
      }

      /* TOASTS */
      .notif {
        position: fixed;
        top: 62px;
        right: 16px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 6px;
        pointer-events: none;
      }
      .n-item {
        background: var(--s1);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 8px 14px;
        font-family: var(--mono);
        font-size: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        animation: nIn 0.25s ease-out;
      }
      @keyframes nIn {
        from {
          opacity: 0;
          transform: translateX(16px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .n-ok {
        border-left: 3px solid var(--green);
        color: var(--green);
      }
      .n-err {
        border-left: 3px solid var(--red);
        color: var(--red);
      }
      .n-info {
        border-left: 3px solid var(--cyan);
        color: var(--cyan);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Turf.js for pincode polygon preview on map -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

      function fmtDist(d) {
        return d >= 1000 ? (d / 1000).toFixed(2) + " km" : Math.round(d) + " m";
      }
      function fmtTime(d) {
        return new Date(d).toLocaleTimeString();
      }
      function initials(n) {
        return (n || "?")
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);
      }
      function avatarColors(n) {
        const h = [
          "#00e676",
          "#40c4ff",
          "#b388ff",
          "#ffab00",
          "#ff6d00",
          "#f48fb1",
        ];
        return h[(n || "").charCodeAt(0) % h.length];
      }

      async function api(base, path, opts = {}) {
        const isFormData = opts.body instanceof FormData;
        const r = await fetch(base + path, {
          headers: isFormData ? {} : { "Content-Type": "application/json" },
          ...opts,
          body: isFormData
            ? opts.body
            : opts.body
              ? JSON.stringify(opts.body)
              : undefined,
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          throw new Error(e.error || r.statusText);
        }
        return r.json();
      }

      /* ── STAT PILL ── */
      function Pill({ label, value, color }) {
        return (
          <div className="spill">
            <div className="spill-v" style={{ color }}>
              {value}
            </div>
            <div className="spill-l">{label}</div>
          </div>
        );
      }

      /* ── CIRCULAR ZONE FORM ── */
      function CircularZoneForm({
        apiBase,
        editZone,
        onSaved,
        notify,
        onPickMode,
        pickMode,
      }) {
        const [name, setName] = useState(editZone?.name || "");
        const [lat, setLat] = useState(editZone?.lat || "");
        const [lng, setLng] = useState(editZone?.lng || "");
        const [radius, setRadius] = useState(editZone?.radius || 500);
        const [active, setActive] = useState(editZone?.active !== false);

        useEffect(() => {
          setName(editZone?.name || "");
          setLat(editZone?.lat || "");
          setLng(editZone?.lng || "");
          setRadius(editZone?.radius || 500);
          setActive(editZone?.active !== false);
        }, [editZone]);

        async function save() {
          if (!name || !lat || !lng) {
            notify("Name, Lat, Lng required", "err");
            return;
          }
          const payload = {
            name,
            lat: +lat,
            lng: +lng,
            radius: +radius,
            active,
            pincodes: [],
          };
          try {
            if (editZone?._id) {
              await api(apiBase, "/api/zones/" + editZone._id, {
                method: "PUT",
                body: payload,
              });
              notify("Zone updated ✓", "ok");
            } else {
              await api(apiBase, "/api/zones", {
                method: "POST",
                body: payload,
              });
              notify("Zone created ✓", "ok");
            }
            onSaved();
          } catch (e) {
            notify(e.message, "err");
          }
        }

        return (
          <div className="sb-body">
            <div className="fld">
              <label>Zone Name</label>
              <input
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder="Office Premises"
              />
            </div>
            <div className="fld-row">
              <div className="fld">
                <label>Latitude</label>
                <input
                  type="number"
                  step="any"
                  value={lat}
                  onChange={(e) => setLat(e.target.value)}
                  placeholder="28.6139"
                />
              </div>
              <div className="fld">
                <label>Longitude</label>
                <input
                  type="number"
                  step="any"
                  value={lng}
                  onChange={(e) => setLng(e.target.value)}
                  placeholder="77.2090"
                />
              </div>
            </div>
            <div className="fld">
              <label>Radius (meters)</label>
              <input
                type="number"
                value={radius}
                onChange={(e) => setRadius(e.target.value)}
                min="50"
                max="100000"
              />
            </div>
            <div className="fld">
              <label>Status</label>
              <select
                value={active}
                onChange={(e) => setActive(e.target.value === "true")}
              >
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <button
                className="btn btn-ghost btn-sm"
                style={{ flex: 1 }}
                onClick={onPickMode}
              >
                {pickMode ? "✕ Cancel Pick" : "⌖ Pick on Map"}
              </button>
            </div>
            <div className="pick-hint">⌖ Click map to set center point</div>
            <button className="btn btn-primary" onClick={save}>
              💾 {editZone?._id ? "Update" : "Create"} Zone
            </button>
          </div>
        );
      }

      /* ── PINCODE ZONE FORM ── */
      function PincodeZoneForm({
        apiBase,
        editZone,
        onSaved,
        notify,
        onPreviewPolygon,
      }) {
        const [name, setName] = useState(editZone?.name || "");
        const [pincodeInput, setPincodeInput] = useState("");
        const [pincodes, setPincodes] = useState(editZone?.pincodes || []);
        const [active, setActive] = useState(editZone?.active !== false);
        const [resolving, setResolving] = useState(false);
        const [resolveStatus, setResolveStatus] = useState(null); // null | { ok, msg }

        useEffect(() => {
          setName(editZone?.name || "");
          setPincodes(editZone?.pincodes || []);
          setActive(editZone?.active !== false);
          setResolveStatus(null);
        }, [editZone]);

        function addPincode() {
          const pc = pincodeInput.trim().replace(/\D/g, "");
          if (pc.length !== 6) {
            notify("Enter a valid 6-digit pincode", "err");
            return;
          }
          if (pincodes.includes(pc)) {
            notify("Pincode already added", "err");
            return;
          }
          setPincodes((p) => [...p, pc]);
          setPincodeInput("");
          setResolveStatus(null);
        }
        function removePincode(pc) {
          setPincodes((p) => p.filter((x) => x !== pc));
          setResolveStatus(null);
        }

        async function resolvePreview() {
          if (pincodes.length === 0) {
            notify("Add at least one pincode first", "err");
            return;
          }
          setResolving(true);
          setResolveStatus({
            ok: null,
            msg: `Resolving ${pincodes.length} pincode(s) via OpenStreetMap… (may take a few seconds)`,
          });
          try {
            const result = await api(apiBase, "/api/zones/resolve-pincodes", {
              method: "POST",
              body: { pincodes },
            });
            setResolveStatus({
              ok: true,
              msg: `✓ Polygon resolved — centre: ${result.center.lat.toFixed(4)}, ${result.center.lng.toFixed(4)}`,
            });
            onPreviewPolygon(result.boundary, result.center);
          } catch (e) {
            setResolveStatus({ ok: false, msg: "✗ " + e.message });
          } finally {
            setResolving(false);
          }
        }

        async function save() {
          if (!name) {
            notify("Zone name required", "err");
            return;
          }
          if (pincodes.length === 0) {
            notify("Add at least one pincode", "err");
            return;
          }
          notify(
            "Creating zone — resolving pincodes… (may take ~" +
              pincodes.length * 2 +
              "s)",
            "info",
          );
          try {
            if (editZone?._id) {
              await api(apiBase, "/api/zones/" + editZone._id, {
                method: "PUT",
                body: { name, pincodes, active },
              });
              notify("Zone updated ✓", "ok");
            } else {
              await api(apiBase, "/api/zones", {
                method: "POST",
                body: { name, pincodes, active },
              });
              notify("Zone created ✓", "ok");
            }
            onSaved();
          } catch (e) {
            notify(e.message, "err");
          }
        }

        return (
          <div className="sb-body">
            <div className="fld">
              <label>Zone Name</label>
              <input
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder="Delhi Zone A"
              />
            </div>

            <div className="fld">
              <label>Pincodes</label>
              <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                <input
                  value={pincodeInput}
                  onChange={(e) =>
                    setPincodeInput(
                      e.target.value.replace(/\D/g, "").slice(0, 6),
                    )
                  }
                  onKeyDown={(e) => e.key === "Enter" && addPincode()}
                  placeholder="110001"
                  inputMode="numeric"
                  maxLength={6}
                  style={{ flex: 1 }}
                />
                <button className="conn-btn" onClick={addPincode}>
                  + Add
                </button>
              </div>
              {pincodes.length > 0 && (
                <div className="pc-tags">
                  {pincodes.map((pc) => (
                    <span key={pc} className="pc-tag">
                      {pc}
                      <button onClick={() => removePincode(pc)}>×</button>
                    </span>
                  ))}
                </div>
              )}
            </div>

            {pincodes.length > 0 && (
              <button
                className="pc-resolve-btn"
                onClick={resolvePreview}
                disabled={resolving}
              >
                {resolving ? "⏳ Resolving…" : "🗺 Preview Polygon on Map"}
              </button>
            )}

            {resolveStatus && (
              <div
                className={`pc-status ${resolveStatus.ok === null ? "loading" : resolveStatus.ok ? "ok" : "err"}`}
              >
                {resolveStatus.msg}
              </div>
            )}

            <div className="fld">
              <label>Status</label>
              <select
                value={active}
                onChange={(e) => setActive(e.target.value === "true")}
              >
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>

            <div className="pick-hint" style={{ marginBottom: 10 }}>
              ℹ Polygons are fetched from OpenStreetMap. One API call per
              pincode (~1s each).
            </div>
            <button className="btn btn-primary" onClick={save}>
              💾 {editZone?._id ? "Update" : "Create"} Pincode Zone
            </button>
          </div>
        );
      }

      /* ── POLYGON ZONE FORM ── */
      function PolygonZoneForm({
        apiBase,
        editZone,
        onSaved,
        notify,
        onDrawMode,
        drawMode,
        drawnCoords,
        onClearDraw,
      }) {
        const [name, setName] = React.useState(editZone?.name || "");
        const [active, setActive] = React.useState(editZone?.active !== false);
        const [manualInput, setManualInput] = React.useState("");
        const [resolving, setResolving] = React.useState(false);
        const [previewStatus, setPreviewStatus] = React.useState(null);

        React.useEffect(() => {
          setName(editZone?.name || "");
          setActive(editZone?.active !== false);
          // If editing an existing polygon zone, prefill manual textarea with its coords
          if (
            editZone?.zoneType === "polygon" &&
            editZone?.boundary?.coordinates?.[0]
          ) {
            const ring = editZone.boundary.coordinates[0];
            const pairs = ring
              .slice(0, -1)
              .map(([lng, lat]) => `${lat}, ${lng}`)
              .join("\n");
            setManualInput(pairs);
          } else {
            setManualInput("");
          }
        }, [editZone]);

        // Sync drawn coords into textarea display
        React.useEffect(() => {
          if (drawnCoords && drawnCoords.length > 0) {
            const pairs = drawnCoords
              .map(([lng, lat]) => `${lat}, ${lng}`)
              .join("\n");
            setManualInput(pairs);
          }
        }, [drawnCoords]);

        function parseManualCoords(text) {
          // Accept "lat, lng" one per line OR JSON array
          const lines = text.trim().split(/\n|;/);
          const coords = [];
          for (const line of lines) {
            const clean = line.trim().replace(/[[\]]/g, "");
            if (!clean) continue;
            const parts = clean.split(/[\s,]+/).map(Number);
            if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
              // User enters lat,lng — convert to [lng,lat] for GeoJSON
              coords.push([parts[1], parts[0]]);
            }
          }
          return coords;
        }

        async function previewOnMap() {
          const coords = parseManualCoords(manualInput);
          if (coords.length < 3) {
            notify("Need at least 3 coordinate pairs", "err");
            return;
          }
          setResolving(true);
          setPreviewStatus({ ok: null, msg: "Validating polygon…" });
          try {
            const result = await api(apiBase, "/api/zones/resolve-polygon", {
              method: "POST",
              body: { polygonCoords: coords },
            });
            onSaved.__previewPolygon &&
              onSaved.__previewPolygon(result.boundary, result.center);
            setPreviewStatus({
              ok: true,
              msg: `✓ Valid polygon — ${result.vertexCount} vertices`,
            });
          } catch (e) {
            setPreviewStatus({ ok: false, msg: e.message });
          } finally {
            setResolving(false);
          }
        }

        async function save() {
          if (!name.trim()) {
            notify("Zone name required", "err");
            return;
          }
          // Prefer drawn coords, else parse manual input
          let coords =
            drawnCoords && drawnCoords.length >= 3
              ? drawnCoords
              : parseManualCoords(manualInput);
          if (coords.length < 3) {
            notify("Add at least 3 vertices / coordinates", "err");
            return;
          }

          notify("Saving polygon zone…", "info");
          try {
            const body = {
              name,
              active,
              polygonCoords: coords,
              zoneType: "polygon",
            };
            if (editZone?._id) {
              await api(apiBase, "/api/zones/" + editZone._id, {
                method: "PUT",
                body,
              });
              notify("Zone updated ✓", "ok");
            } else {
              await api(apiBase, "/api/zones", { method: "POST", body });
              notify("Polygon zone created ✓", "ok");
            }
            onClearDraw();
            setManualInput("");
            onSaved();
          } catch (e) {
            notify(e.message, "err");
          }
        }

        const vertexCount =
          drawnCoords?.length || 0 || parseManualCoords(manualInput).length;

        return (
          <div className="sb-body">
            <div className="fld">
              <label>Zone Name</label>
              <input
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder="Polygon Zone Name"
              />
            </div>

            {/* Draw on map section */}
            <div className="fld">
              <label>Draw on Map</label>
              <button
                className={`poly-draw-btn${drawMode ? " active" : ""}`}
                onClick={onDrawMode}
              >
                {drawMode
                  ? "✏ Drawing… (click to add vertices)"
                  : "✏ Start Drawing on Map"}
              </button>
              {drawMode && (
                <div className="poly-hint">
                  🖱 Click on the map to add vertices.
                  <br />
                  Double-click to finish the polygon.
                  <br />
                  Press ESC or click "Stop Drawing" to cancel.
                </div>
              )}
              {drawnCoords && drawnCoords.length > 0 && (
                <div className="poly-vertex-count">
                  🔷 {drawnCoords.length} vertices drawn
                  <button
                    onClick={onClearDraw}
                    style={{
                      marginLeft: 8,
                      background: "none",
                      border: "1px solid var(--border2)",
                      color: "var(--sub)",
                      borderRadius: 4,
                      padding: "1px 6px",
                      cursor: "pointer",
                      fontSize: 8,
                    }}
                  >
                    ✕ Clear
                  </button>
                </div>
              )}
            </div>

            {/* Manual coordinate entry */}
            <div className="fld">
              <label>Manual Coordinates</label>
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 8,
                  color: "var(--sub)",
                  marginBottom: 4,
                }}
              >
                One vertex per line:{" "}
                <strong style={{ color: "var(--text)" }}>lat, lng</strong>
              </div>
              <textarea
                className="poly-coord-area"
                rows={6}
                value={manualInput}
                onChange={(e) => setManualInput(e.target.value)}
                placeholder={
                  "28.6139, 77.2090\n28.6200, 77.2150\n28.6180, 77.2250\n..."
                }
              />
              <button
                className="pc-resolve-btn"
                onClick={previewOnMap}
                disabled={resolving || !manualInput.trim()}
              >
                {resolving ? "⏳ Validating…" : "🗺 Preview Polygon on Map"}
              </button>
              {previewStatus && (
                <div
                  className={`pc-status ${previewStatus.ok === null ? "loading" : previewStatus.ok ? "ok" : "err"}`}
                >
                  {previewStatus.msg}
                </div>
              )}
            </div>

            {vertexCount > 0 && (
              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 9,
                  color: "var(--purple)",
                  marginBottom: 8,
                  padding: "4px 8px",
                  background: "rgba(179,136,255,0.06)",
                  borderRadius: 5,
                }}
              >
                🔷 {vertexCount} total vertices ready
              </div>
            )}

            <div className="fld">
              <label>Status</label>
              <select
                value={active}
                onChange={(e) => setActive(e.target.value === "true")}
              >
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>

            <button className="btn btn-primary" onClick={save}>
              💾 {editZone?._id ? "Update" : "Create"} Polygon Zone
            </button>
          </div>
        );
      }

      /* ── PINCODE TRACKING PANEL ── */
      function PincodeTrackingPanel({ users, liveUsers, zones }) {
        const pincodeZones = zones.filter(
          (z) => z.pincodes && z.pincodes.length > 0,
        );
        const usersWithPin = users.filter((u) => u.pincode);

        if (pincodeZones.length === 0) {
          return (
            <div
              style={{
                padding: 16,
                textAlign: "center",
                fontFamily: "var(--mono)",
                fontSize: 10,
                color: "var(--muted)",
              }}
            >
              <div style={{ fontSize: 28, marginBottom: 8 }}>📮</div>
              No pincode zones defined yet.
              <br />
              Create a pincode zone using the "Pincode" tab above.
            </div>
          );
        }

        return (
          <div style={{ padding: "12px 14px" }}>
            {pincodeZones.map((zone) => {
              const liveInZone = liveUsers.filter(
                (u) =>
                  u.zoneId === zone._id ||
                  String(u.zoneId) === String(zone._id),
              );

              // Collect unique district info across pincodes of this zone
              const districtInfo = zone.pincodeDistrictInfo || {};
              const districts = [
                ...new Set(
                  Object.values(districtInfo)
                    .map((d) => d.district)
                    .filter(Boolean),
                ),
              ];
              const states = [
                ...new Set(
                  Object.values(districtInfo)
                    .map((d) => d.state)
                    .filter(Boolean),
                ),
              ];

              return (
                <div key={zone._id} className="pc-admin-panel">
                  <div className="pc-admin-title">
                    📍 {zone.name}
                    <span
                      style={{
                        color: "var(--sub)",
                        marginLeft: 6,
                        fontWeight: 400,
                      }}
                    >
                      · {zone.pincodes.join(", ")}
                    </span>
                  </div>
                  {/* District & state info */}
                  {districts.length > 0 && (
                    <div style={{ marginBottom: 6 }}>
                      <span className="pc-district-badge">
                        🏛 {districts.join(" · ")}
                        {states.length > 0 && (
                          <span style={{ opacity: 0.7 }}>, {states[0]}</span>
                        )}
                      </span>
                    </div>
                  )}
                  {/* Per-pincode area breakdown */}
                  {zone.pincodes.length > 0 &&
                    Object.keys(districtInfo).length > 0 && (
                      <div style={{ marginBottom: 8 }}>
                        {zone.pincodes.map((pc) => {
                          const info = districtInfo[pc];
                          if (!info) return null;
                          return (
                            <div key={pc} className="pc-area-line">
                              <span style={{ color: "var(--amber)" }}>
                                📮 {pc}
                              </span>
                              {info.area && <span> — {info.area}</span>}
                              {info.taluk && info.taluk !== info.area && (
                                <span style={{ opacity: 0.6 }}>
                                  , {info.taluk}
                                </span>
                              )}
                              {info.district && (
                                <span style={{ opacity: 0.6 }}>
                                  {" "}
                                  ({info.district})
                                </span>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  {usersWithPin.length === 0 && liveInZone.length === 0 && (
                    <div
                      style={{
                        color: "var(--muted)",
                        fontSize: 9,
                        fontFamily: "var(--mono)",
                      }}
                    >
                      No users with pincodes registered.
                    </div>
                  )}
                  {/* Live users tracked in this zone */}
                  {liveInZone.length > 0 &&
                    liveInZone.map((u) => (
                      <div key={u._id} className="pc-user-row">
                        <div
                          className="u-dot"
                          style={{
                            background: u.isInside
                              ? "var(--green)"
                              : "var(--red)",
                          }}
                        />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div className="pc-user-name">{u.name}</div>
                          <div
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: 9,
                              color: "var(--sub)",
                            }}
                          >
                            {u.email}
                          </div>
                          {u.pincode && (
                            <div className="u-pincode">📮 {u.pincode}</div>
                          )}
                        </div>
                        <div
                          className="pc-user-status"
                          style={{
                            color: u.isInside ? "var(--green)" : "var(--red)",
                          }}
                        >
                          {u.isInside ? "▲ INSIDE" : "▼ OUTSIDE"}
                        </div>
                      </div>
                    ))}
                  {/* Registered users with matching pincodes (offline) */}
                  {usersWithPin
                    .filter((u) => zone.pincodes.includes(u.pincode))
                    .filter((u) => !liveInZone.find((l) => l._id === u._id))
                    .map((u) => (
                      <div key={u._id} className="pc-user-row">
                        <div
                          className="u-dot"
                          style={{ background: "var(--muted)" }}
                        />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div className="pc-user-name">{u.name}</div>
                          <div
                            style={{
                              fontFamily: "var(--mono)",
                              fontSize: 9,
                              color: "var(--sub)",
                            }}
                          >
                            {u.email}
                          </div>
                          <div className="u-pincode">
                            📮 {u.pincode} (registered)
                          </div>
                        </div>
                        <div
                          className="pc-user-status"
                          style={{ color: "var(--muted)" }}
                        >
                          offline
                        </div>
                      </div>
                    ))}
                </div>
              );
            })}
          </div>
        );
      }

      /* ── ADMIN APP ── */
      function AdminApp() {
        const [apiBase, setApiBase] = useState(
          "https://radius-based-geolocation-tracking.onrender.com",
        );
        const [apiInput, setApiInput] = useState(
          "https://radius-based-geolocation-tracking.onrender.com",
        );
        const [connected, setConnected] = useState(false);
        const [connErr, setConnErr] = useState(false);
        const [stats, setStats] = useState({
          totalZones: 0,
          activeUsers: 0,
          totalEvents: 0,
          insideCount: 0,
          registeredUsers: 0,
        });
        const [zones, setZones] = useState([]);
        const [users, setUsers] = useState([]);
        const [liveUsers, setLiveUsers] = useState([]);
        const [events, setEvents] = useState([]);
        const [editZone, setEditZone] = useState(null);
        const [selZone, setSelZone] = useState(null);
        const [toasts, setToasts] = useState([]);
        const [pickMode, setPickMode] = useState(false);
        const [evtFilter, setEvtFilter] = useState("");
        const [sosReports, setSosReports] = useState([]);
        const [activeTab, setActiveTab] = useState("events"); // "events" | "checkins" | "pincodes"
        const [sosLightbox, setSosLightbox] = useState(null);
        const [zoneFormTab, setZoneFormTab] = useState("circular"); // "circular" | "pincode" | "polygon"
        const [previewLayer, setPreviewLayer] = useState(null); // leaflet layer for pincode preview

        // Polygon drawing state
        const [drawMode, setDrawMode] = useState(false);
        const [drawnCoords, setDrawnCoords] = useState([]); // [[lng,lat],...]
        const drawModeRef = useRef(false);
        const drawnCoordsRef = useRef([]);
        const drawLayerRef = useRef(null); // temp drawing layer

        const mapRef = useRef(null);
        const leafletRef = useRef(null);
        const zoneLayerRef = useRef(null);
        const userLayerRef = useRef(null);
        const previewLayerRef = useRef(null);
        const pickModeRef = useRef(false);
        pickModeRef.current = pickMode;

        const notify = useCallback((msg, type = "info") => {
          const id = Date.now();
          setToasts((p) => [...p, { id, msg, type }]);
          setTimeout(
            () => setToasts((p) => p.filter((t) => t.id !== id)),
            4000,
          );
        }, []);

        /* Keep refs in sync */
        drawModeRef.current = drawMode;
        drawnCoordsRef.current = drawnCoords;

        /* Toggle polygon draw mode */
        function toggleDrawMode() {
          const entering = !drawMode;
          setDrawMode(entering);
          if (!entering) {
            // Finish/cancel drawing
            redrawTempPolygon(drawnCoordsRef.current);
          }
        }

        function clearDraw() {
          setDrawnCoords([]);
          drawnCoordsRef.current = [];
          setDrawMode(false);
          if (drawLayerRef.current && leafletRef.current) {
            leafletRef.current.removeLayer(drawLayerRef.current);
            drawLayerRef.current = null;
          }
        }

        function redrawTempPolygon(coords) {
          const L = window.L;
          if (!leafletRef.current) return;
          if (drawLayerRef.current) {
            leafletRef.current.removeLayer(drawLayerRef.current);
            drawLayerRef.current = null;
          }
          if (coords.length < 2) return;
          // Draw dots for each vertex
          const lg = L.layerGroup().addTo(leafletRef.current);
          coords.forEach(([lng, lat], i) => {
            L.circleMarker([lat, lng], {
              radius: 5,
              color: "#b388ff",
              fillColor: i === 0 ? "#fff" : "#b388ff",
              fillOpacity: 1,
              weight: 2,
            }).addTo(lg);
          });
          // Draw lines
          if (coords.length >= 2) {
            const latlngs = coords.map(([lng, lat]) => [lat, lng]);
            L.polyline(latlngs, {
              color: "#b388ff",
              weight: 2,
              dashArray: "6 3",
            }).addTo(lg);
          }
          // If >= 3 vertices, show fill preview
          if (coords.length >= 3) {
            const latlngs = coords.map(([lng, lat]) => [lat, lng]);
            L.polygon(latlngs, {
              color: "#b388ff",
              fillColor: "#b388ff",
              fillOpacity: 0.1,
              weight: 1.5,
              dashArray: "6 3",
            }).addTo(lg);
          }
          drawLayerRef.current = lg;
        }

        /* Init map */
        useEffect(() => {
          const L = window.L;
          const map = L.map(mapRef.current, {
            zoomControl: true,
            attributionControl: false,
          }).setView([20.59, 78.96], 5);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
          }).addTo(map);
          zoneLayerRef.current = L.layerGroup().addTo(map);
          userLayerRef.current = L.layerGroup().addTo(map);
          leafletRef.current = map;

          map.on("click", (e) => {
            // Pick mode (circular zone center)
            if (pickModeRef.current) {
              setEditZone((prev) => ({
                ...prev,
                lat: e.latlng.lat.toFixed(6),
                lng: e.latlng.lng.toFixed(6),
              }));
              setPickMode(false);
              notify(
                `Center set: ${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`,
                "info",
              );
              return;
            }
            // Polygon draw mode
            if (drawModeRef.current) {
              const newCoord = [e.latlng.lng, e.latlng.lat];
              const updated = [...drawnCoordsRef.current, newCoord];
              drawnCoordsRef.current = updated;
              setDrawnCoords([...updated]);
              redrawTempPolygon(updated);
            }
          });

          // Double-click finishes polygon drawing
          map.on("dblclick", (e) => {
            if (!drawModeRef.current) return;
            L.DomEvent.stop(e);
            const coords = drawnCoordsRef.current;
            if (coords.length < 3) {
              notify("Need at least 3 vertices to form a polygon", "err");
              return;
            }
            setDrawMode(false);
            drawModeRef.current = false;
            redrawTempPolygon(coords);
            notify(
              `✓ Polygon drawn — ${coords.length} vertices. Click Save to create zone.`,
              "ok",
            );
          });

          // ESC key cancels draw
          const onKey = (e) => {
            if (e.key === "Escape" && drawModeRef.current) {
              setDrawMode(false);
              drawModeRef.current = false;
              notify("Drawing cancelled", "info");
            }
          };
          document.addEventListener("keydown", onKey);

          return () => {
            document.removeEventListener("keydown", onKey);
            map.remove();
          };
        }, []);

        useEffect(() => {
          if (mapRef.current)
            mapRef.current.style.cursor = pickMode
              ? "crosshair"
              : drawMode
                ? "crosshair"
                : "";
        }, [pickMode, drawMode]);

        /* Render zones on map */
        useEffect(() => {
          const L = window.L;
          if (!zoneLayerRef.current) return;
          zoneLayerRef.current.clearLayers();
          zones.forEach((z) => {
            // Color by type: green=circular, cyan=pincode, purple=polygon; dim if inactive
            const isPolygon = z.zoneType === "polygon";
            const isPincode = z.pincodes?.length > 0;
            const baseCol = isPolygon
              ? "#b388ff"
              : isPincode
                ? "#00bcd4"
                : "#00e676";
            const col = z.active ? baseCol : "#3d4460";
            const style = {
              color: col,
              fillColor: col,
              fillOpacity: 0.07,
              weight: 1.5,
              dashArray: isPolygon ? "4 3" : "6 4",
            };

            if (
              z.boundary &&
              z.boundary.type === "Polygon" &&
              z.boundary.coordinates
            ) {
              // Pincode or drawn polygon — convert [lng,lat] → [lat,lng] for Leaflet
              const latlngs = z.boundary.coordinates[0].map(([lng, lat]) => [
                lat,
                lng,
              ]);
              const label = isPolygon
                ? `${z.name}<br>🔷 Drawn Polygon · ${z.boundary.coordinates[0].length - 1} vertices`
                : `${z.name}<br>📮 ${z.pincodes.join(", ")}`;
              L.polygon(latlngs, style)
                .bindTooltip(
                  `<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:${col}">${label}</span>`,
                  { direction: "top" },
                )
                .addTo(zoneLayerRef.current);
            } else {
              L.circle([z.lat, z.lng], { radius: z.radius, ...style }).addTo(
                zoneLayerRef.current,
              );
            }

            // Centre marker
            const centerLabel = isPolygon
              ? `${z.name}<br>🔷 Polygon centroid`
              : isPincode
                ? `${z.name}<br>📮 ${z.pincodes.join(", ")}`
                : `${z.name}<br>⊙ ${fmtDist(z.radius)}`;

            L.circleMarker([z.lat, z.lng], {
              radius: 5,
              color: "#000",
              fillColor: col,
              fillOpacity: 1,
              weight: 2,
            })
              .bindTooltip(
                `<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:${col}">${centerLabel}</span>`,
                { direction: "top" },
              )
              .addTo(zoneLayerRef.current);
          });
        }, [zones]);

        /* Render live users on map */
        useEffect(() => {
          const L = window.L;
          if (!userLayerRef.current) return;
          userLayerRef.current.clearLayers();
          liveUsers.forEach((u) => {
            if (!u.lat || !u.lng) return;
            const col = u.isInside ? "#00e676" : "#ff3d5a";
            const pinInfo = u.pincode ? `<br>📮 ${u.pincode}` : "";

            // Avatar HTML for popup
            const avatarBg = u.profileImageUrl
              ? "transparent"
              : avatarColors(u.name);
            const avatarHtml = u.profileImageUrl
              ? `<img src="${u.profileImageUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" alt="${u.name}" />`
              : `<span style="font-size:18px;font-weight:700;color:#000">${initials(u.name)}</span>`;

            const lastSeen = u.lastSeen
              ? new Date(u.lastSeen).toLocaleString()
              : "—";
            const dist =
              u.distanceToCenter != null ? fmtDist(u.distanceToCenter) : "—";

            const popupHtml = `
              <div class="user-popup">
                <div class="user-popup-avatar" style="background:${avatarBg};display:flex;align-items:center;justify-content:center">
                  ${avatarHtml}
                </div>
                <div class="user-popup-name">${u.name}</div>
                <div class="user-popup-email">${u.email}</div>
                <div class="user-popup-row">
                  <span>Status</span>
                  <span style="color:${col};font-weight:700">${u.isInside ? "▲ Inside Zone" : "▼ Outside Zone"}</span>
                </div>
                ${u.pincode ? `<div class="user-popup-row"><span>Pincode</span><span>📮 ${u.pincode}</span></div>` : ""}
                <div class="user-popup-row"><span>Distance</span><span>${dist}</span></div>
                <div class="user-popup-row"><span>Coords</span><span>${u.lat.toFixed(4)}, ${u.lng.toFixed(4)}</span></div>
                <div class="user-popup-row"><span>Last seen</span><span>${lastSeen}</span></div>
                <div style="margin-top:8px;text-align:center">
                  <a href="https://www.google.com/maps?q=${u.lat},${u.lng}" target="_blank" rel="noopener"
                    style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--cyan);text-decoration:none">
                    ↗ Open in Maps
                  </a>
                </div>
              </div>
            `;

            // Outer ring marker for "live pulse" effect
            L.circleMarker([u.lat, u.lng], {
              radius: 13,
              color: col,
              fillColor: col,
              fillOpacity: 0.12,
              weight: 1,
            }).addTo(userLayerRef.current);

            L.circleMarker([u.lat, u.lng], {
              radius: 7,
              color: "#000",
              fillColor: col,
              fillOpacity: 1,
              weight: 2,
            })
              .bindTooltip(
                `<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:${col}">${u.name}<br>${u.email}${pinInfo}<br>${u.isInside ? "▲ Inside" : "▼ Outside"} · ${dist}</span>`,
                { direction: "top" },
              )
              .bindPopup(popupHtml, {
                maxWidth: 240,
                className: "user-profile-popup",
              })
              .addTo(userLayerRef.current);
          });
        }, [liveUsers]);

        /* Preview pincode polygon on map */
        function handlePreviewPolygon(boundary, center) {
          const L = window.L;
          if (previewLayerRef.current) {
            leafletRef.current.removeLayer(previewLayerRef.current);
            previewLayerRef.current = null;
          }
          if (!boundary || boundary.type !== "Polygon") return;
          const latlngs = boundary.coordinates[0].map(([lng, lat]) => [
            lat,
            lng,
          ]);
          const layer = L.polygon(latlngs, {
            color: "#00bcd4",
            fillColor: "#00bcd4",
            fillOpacity: 0.12,
            weight: 2,
            dashArray: "8 4",
          }).addTo(leafletRef.current);
          previewLayerRef.current = layer;
          leafletRef.current.fitBounds(layer.getBounds().pad(0.15));
          notify("Polygon preview shown on map", "info");
        }

        async function loadAll() {
          try {
            const [s, z, u, lu] = await Promise.all([
              api(apiBase, "/api/stats"),
              api(apiBase, "/api/zones"),
              api(apiBase, "/api/users"),
              api(apiBase, "/api/users/live"),
            ]);
            setStats(s);
            setZones(z);
            setUsers(u);
            setLiveUsers(lu);
            setConnected(true);
            setConnErr(false);
            await loadEvents(z);
            await loadSos();
            notify("Connected to " + apiBase, "ok");
          } catch (e) {
            setConnected(false);
            setConnErr(true);
            notify(e.message, "err");
          }
        }

        async function loadEvents(zList = zones) {
          try {
            const url =
              "/api/events?limit=80" +
              (evtFilter ? "&zoneId=" + evtFilter : "");
            const data = await api(apiBase, url);
            setEvents(data.events || []);
          } catch {}
        }

        async function loadSos() {
          try {
            const data = await api(apiBase, "/api/checkin?limit=100");
            setSosReports(data.reports || []);
          } catch {}
        }

        async function deleteSos(id) {
          if (!confirm("Delete this check-in?")) return;
          try {
            await api(apiBase, "/api/checkin/" + id, { method: "DELETE" });
            notify("Check-in deleted", "info");
            loadSos();
          } catch (e) {
            notify(e.message, "err");
          }
        }

        async function deleteZone(id) {
          if (!confirm("Delete this zone?")) return;
          try {
            await api(apiBase, "/api/zones/" + id, { method: "DELETE" });
            notify("Zone deleted", "info");
            loadAll();
          } catch (e) {
            notify(e.message, "err");
          }
        }

        /* Auto-refresh */
        useEffect(() => {
          if (!connected) return;
          loadSos();
          const t1 = setInterval(() => {
            api(apiBase, "/api/users/live")
              .then(setLiveUsers)
              .catch(() => {});
            api(apiBase, "/api/stats")
              .then(setStats)
              .catch(() => {});
          }, 5000);
          const t2 = setInterval(loadEvents, 15000);
          const t3 = setInterval(loadSos, 30000);
          return () => {
            clearInterval(t1);
            clearInterval(t2);
            clearInterval(t3);
          };
        }, [connected, apiBase, evtFilter]);

        return (
          <div className="shell">
            {/* TOPBAR */}
            <header className="topbar">
              <div className="brand">
                <div className="brand-logo">🛰</div>
                <div>
                  <div className="brand-name">GeoAdmin</div>
                  <div className="brand-tag">Control Panel</div>
                </div>
              </div>
              <div className="api-row">
                <span className="api-lbl">API:</span>
                <input
                  className="api-inp"
                  value={apiInput}
                  onChange={(e) => setApiInput(e.target.value)}
                  onKeyDown={(e) =>
                    e.key === "Enter" && (setApiBase(apiInput), loadAll())
                  }
                />
                <button
                  className="conn-btn"
                  onClick={() => {
                    setApiBase(apiInput);
                    loadAll();
                  }}
                >
                  Connect
                </button>
              </div>
              <div className="stat-pills">
                <Pill
                  label="Zones"
                  value={stats.totalZones}
                  color="var(--cyan)"
                />
                <Pill
                  label="Registered"
                  value={stats.registeredUsers}
                  color="var(--purple)"
                />
                <Pill
                  label="Live"
                  value={stats.activeUsers}
                  color="var(--blue)"
                />
                <Pill
                  label="Inside"
                  value={stats.insideCount}
                  color="var(--green)"
                />
                <Pill
                  label="Events"
                  value={stats.totalEvents}
                  color="var(--amber)"
                />
              </div>
              <div className="conn-status">
                <div
                  className={`conn-dot ${connected ? "on" : ""}${connErr ? " err" : ""}`}
                />
                <span className="conn-lbl">
                  {connected ? "Connected" : connErr ? "Error" : "Disconnected"}
                </span>
              </div>
            </header>

            {/* SIDEBAR */}
            <aside className="sidebar">
              {/* Zone form with tab: circular / pincode */}
              <div className="sb-sec">
                <div className="sb-sec-hdr">
                  ➕ {editZone?._id ? "Edit Zone" : "New Zone"}
                  <span className="sb-sec-badge">
                    {editZone?._id ? "EDIT" : "NEW"}
                  </span>
                </div>
                <div className="zone-tabs">
                  <button
                    className={`ztab ${zoneFormTab === "circular" ? "active" : ""}`}
                    onClick={() => {
                      setZoneFormTab("circular");
                      clearDraw();
                    }}
                  >
                    ⊙ Circular
                  </button>
                  <button
                    className={`ztab ${zoneFormTab === "pincode" ? "active" : ""}`}
                    onClick={() => {
                      setZoneFormTab("pincode");
                      clearDraw();
                    }}
                  >
                    📮 Pincode
                  </button>
                  <button
                    className={`ztab ${zoneFormTab === "polygon" ? "active" : ""}`}
                    onClick={() => {
                      setZoneFormTab("polygon");
                      setPickMode(false);
                    }}
                  >
                    🔷 Polygon
                  </button>
                </div>
                {zoneFormTab === "circular" ? (
                  <CircularZoneForm
                    apiBase={apiBase}
                    editZone={editZone}
                    onSaved={() => {
                      setEditZone(null);
                      loadAll();
                    }}
                    notify={notify}
                    onPickMode={() => setPickMode((p) => !p)}
                    pickMode={pickMode}
                  />
                ) : zoneFormTab === "pincode" ? (
                  <PincodeZoneForm
                    apiBase={apiBase}
                    editZone={editZone}
                    onSaved={() => {
                      setEditZone(null);
                      loadAll();
                    }}
                    notify={notify}
                    onPreviewPolygon={handlePreviewPolygon}
                  />
                ) : (
                  <PolygonZoneForm
                    apiBase={apiBase}
                    editZone={editZone}
                    onSaved={Object.assign(
                      () => {
                        setEditZone(null);
                        clearDraw();
                        loadAll();
                      },
                      { __previewPolygon: handlePreviewPolygon },
                    )}
                    notify={notify}
                    onDrawMode={toggleDrawMode}
                    drawMode={drawMode}
                    drawnCoords={drawnCoords}
                    onClearDraw={clearDraw}
                  />
                )}
                {editZone?._id && (
                  <div style={{ padding: "0 14px 12px" }}>
                    <button
                      className="btn btn-ghost"
                      onClick={() => setEditZone(null)}
                    >
                      ✕ Cancel Edit
                    </button>
                  </div>
                )}
              </div>

              {/* Zone list */}
              <div className="sb-sec">
                <div className="sb-sec-hdr">
                  📍 Zones<span className="sb-sec-badge">{zones.length}</span>
                </div>
                <div className="sb-body">
                  {zones.length === 0 && (
                    <div
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 9,
                        color: "var(--sub)",
                      }}
                    >
                      No zones yet. Create one above.
                    </div>
                  )}
                  {zones.map((z) => (
                    <div
                      key={z._id}
                      className={`zone-item ${selZone === z._id ? "sel" : ""}`}
                      onClick={() => {
                        setSelZone(z._id);
                        leafletRef.current?.setView([z.lat, z.lng], 14);
                      }}
                    >
                      <div className="zi-name">
                        <span
                          style={{
                            flex: 1,
                            overflow: "hidden",
                            textOverflow: "ellipsis",
                            whiteSpace: "nowrap",
                          }}
                        >
                          {z.name}
                        </span>
                        {z.zoneType === "polygon" && (
                          <span className="zi-badge zi-poly">🔷</span>
                        )}
                        {z.pincodes?.length > 0 && (
                          <span className="zi-badge zi-pc">📮</span>
                        )}
                        <span
                          className={`zi-badge ${z.active ? "zi-on" : "zi-off"}`}
                        >
                          {z.active ? "ON" : "OFF"}
                        </span>
                      </div>
                      <div className="zi-meta">
                        {z.zoneType === "polygon" ? (
                          <span>
                            🔷 Drawn polygon ·{" "}
                            {z.boundary?.coordinates?.[0]?.length - 1 || "?"}{" "}
                            vertices
                          </span>
                        ) : z.pincodes?.length > 0 ? (
                          <span>📮 {z.pincodes.join(", ")}</span>
                        ) : (
                          <>
                            <span>
                              📍 {z.lat.toFixed(4)}, {z.lng.toFixed(4)}
                            </span>
                            <span>⊙ {fmtDist(z.radius)}</span>
                          </>
                        )}
                      </div>
                      <div className="zi-acts">
                        <button
                          className="btn btn-ghost btn-sm"
                          onClick={(e) => {
                            e.stopPropagation();
                            setEditZone(z);
                            clearDraw();
                            setZoneFormTab(
                              z.zoneType === "polygon"
                                ? "polygon"
                                : z.pincodes?.length
                                  ? "pincode"
                                  : "circular",
                            );
                          }}
                        >
                          ✏ Edit
                        </button>
                        <button
                          className="btn btn-danger btn-sm"
                          onClick={(e) => {
                            e.stopPropagation();
                            deleteZone(z._id);
                          }}
                        >
                          ✕ Del
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Users */}
              <div className="sb-sec" style={{ flex: 1 }}>
                <div className="sb-sec-hdr">
                  👤 Users<span className="sb-sec-badge">{users.length}</span>
                </div>
                <div className="sb-body">
                  {users.length === 0 && (
                    <div
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 9,
                        color: "var(--sub)",
                      }}
                    >
                      No users registered yet.
                    </div>
                  )}
                  {users.map((u) => {
                    const live = liveUsers.find(
                      (l) => l._id === u._id || l.email === u.email,
                    );
                    const isLive = !!live;
                    const dotColor = isLive
                      ? u.isInside
                        ? "var(--green)"
                        : "var(--red)"
                      : "var(--muted)";
                    return (
                      <div key={u._id} className="user-item">
                        <div
