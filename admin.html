                          className="u-dot"
                          style={{ background: dotColor }}
                        />
                        {/* Profile image or initials */}
                        <div
                          className="u-avatar"
                          style={{
                            background: u.profileImageUrl
                              ? "transparent"
                              : avatarColors(u.name),
                          }}
                        >
                          {u.profileImageUrl ? (
                            <img src={u.profileImageUrl} alt={u.name} />
                          ) : (
                            initials(u.name)
                          )}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div className="u-name">{u.name}</div>
                          <div className="u-email">{u.email}</div>
                          {u.pincode && (
                            <div className="u-pincode">📮 {u.pincode}</div>
                          )}
                        </div>
                        <span
                          className="u-status"
                          style={{
                            color: isLive
                              ? u.isInside
                                ? "var(--green)"
                                : "var(--red)"
                              : "var(--muted)",
                          }}
                        >
                          {isLive ? (u.isInside ? "▲ IN" : "▼ OUT") : "offline"}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </aside>

            {/* MAIN AREA */}
            <main className="main-area">
              <div className="map-wrap">
                <div
                  id="map"
                  ref={mapRef}
                  style={{ width: "100%", height: "100%" }}
                />
                <div className="map-hint">
                  {pickMode
                    ? "⌖ Click anywhere to set zone center"
                    : drawMode
                      ? `✏ Click to add vertices (${drawnCoords.length} so far) · Double-click to finish · ESC to cancel`
                      : "🟡 Zone center  🟢 Inside  🔴 Outside  🔵 Pincode/Polygon preview"}
                </div>
              </div>

              {/* Tabbed panel */}
              <div className="events-panel">
                <div
                  className="ep-hdr"
                  style={{
                    borderBottom: "1px solid var(--border2)",
                    paddingBottom: 0,
                  }}
                >
                  <div style={{ display: "flex", gap: 0 }}>
                    {[
                      {
                        key: "events",
                        label: `📋 Event Log (${events.length})`,
                      },
                      {
                        key: "checkins",
                        label: "📸 Check-Ins",
                        badge: sosReports.length,
                      },
                      { key: "pincodes", label: "📮 Pincode Tracking" },
                    ].map((t) => (
                      <button
                        key={t.key}
                        onClick={() => setActiveTab(t.key)}
                        style={{
                          background:
                            activeTab === t.key ? "var(--s2)" : "transparent",
                          border: "none",
                          borderBottom:
                            activeTab === t.key
                              ? "2px solid var(--cyan)"
                              : "2px solid transparent",
                          color:
                            activeTab === t.key
                              ? "var(--text)"
                              : "var(--muted)",
                          padding: "8px 14px",
                          cursor: "pointer",
                          fontSize: 11,
                          fontFamily: "var(--mono)",
                        }}
                      >
                        {t.label}
                        {t.badge > 0 && (
                          <span
                            style={{
                              background: "var(--green)",
                              color: "#000",
                              borderRadius: 10,
                              padding: "1px 6px",
                              marginLeft: 5,
                              fontSize: 9,
                              fontWeight: 700,
                            }}
                          >
                            {t.badge}
                          </span>
                        )}
                      </button>
                    ))}
                  </div>
                  <div
                    style={{
                      display: "flex",
                      gap: 8,
                      alignItems: "center",
                      paddingBottom: 8,
                    }}
                  >
                    {activeTab === "events" && (
                      <>
                        <select
                          className="api-inp"
                          style={{
                            width: 140,
                            padding: "3px 7px",
                            fontSize: 9,
                          }}
                          value={evtFilter}
                          onChange={(e) => {
                            setEvtFilter(e.target.value);
                            loadEvents();
                          }}
                        >
                          <option value="">All Zones</option>
                          {zones.map((z) => (
                            <option key={z._id} value={z._id}>
                              {z.name}
                            </option>
                          ))}
                        </select>
                        <button
                          className="conn-btn"
                          style={{ padding: "4px 10px", fontSize: 8 }}
                          onClick={loadEvents}
                        >
                          ↺ Refresh
                        </button>
                      </>
                    )}
                    {activeTab === "checkins" && (
                      <button
                        className="conn-btn"
                        style={{ padding: "4px 10px", fontSize: 8 }}
                        onClick={loadSos}
                      >
                        ↺ Refresh
                      </button>
                    )}
                    {activeTab === "pincodes" && (
                      <button
                        className="conn-btn"
                        style={{ padding: "4px 10px", fontSize: 8 }}
                        onClick={loadAll}
                      >
                        ↺ Refresh
                      </button>
                    )}
                  </div>
                </div>

                {/* Events tab */}
                {activeTab === "events" && (
                  <div className="ep-scroll">
                    <table>
                      <thead>
                        <tr>
                          <th>Type</th>
                          <th>User</th>
                          <th>Email</th>
                          <th>Zone</th>
                          <th>Distance</th>
                          <th>Time</th>
                        </tr>
                      </thead>
                      <tbody>
                        {events.map((e) => (
                          <tr key={e._id}>
                            <td className={`ev-${e.type}`}>
                              {e.type === "enter"
                                ? "↗ ENTER"
                                : e.type === "exit"
                                  ? "↙ EXIT"
                                  : "⊙ INFO"}
                            </td>
                            <td>{e.userName || "—"}</td>
                            <td style={{ color: "var(--sub)" }}>
                              {e.userEmail || "—"}
                            </td>
                            <td>{e.zoneName || "—"}</td>
                            <td>
                              {e.distanceToCenter
                                ? fmtDist(e.distanceToCenter)
                                : "—"}
                            </td>
                            <td style={{ color: "var(--sub)" }}>
                              {fmtTime(e.createdAt)}
                            </td>
                          </tr>
                        ))}
                        {events.length === 0 && (
                          <tr>
                            <td
                              colSpan="6"
                              style={{
                                textAlign: "center",
                                color: "var(--muted)",
                                padding: 16,
                              }}
                            >
                              No events yet
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* Check-ins tab */}
                {activeTab === "checkins" &&
                  (() => {
                    const byUser = {};
                    sosReports.forEach((r) => {
                      const key = r.userEmail || r.userName || "unknown";
                      if (!byUser[key])
                        byUser[key] = {
                          name: r.userName,
                          email: r.userEmail,
                          reports: [],
                        };
                      byUser[key].reports.push(r);
                    });
                    const groups = Object.values(byUser);
                    return (
                      <div className="ep-scroll">
                        {groups.length === 0 ? (
                          <div
                            style={{
                              textAlign: "center",
                              color: "var(--muted)",
                              padding: 40,
                              fontSize: 13,
                            }}
                          >
                            <div style={{ fontSize: 32, marginBottom: 10 }}>
                              📸
                            </div>
                            No check-ins yet
                          </div>
                        ) : (
                          <div
                            style={{
                              padding: "12px 14px",
                              display: "flex",
                              flexDirection: "column",
                              gap: 20,
                            }}
                          >
                            {groups.map((group) => (
                              <div
                                key={group.email || group.name}
                                style={{
                                  background: "var(--s2)",
                                  border: "1px solid var(--border2)",
                                  borderRadius: 10,
                                  overflow: "hidden",
                                }}
                              >
                                <div
                                  style={{
                                    background: "var(--s3)",
                                    borderBottom: "1px solid var(--border)",
                                    padding: "10px 14px",
                                    display: "flex",
                                    alignItems: "center",
                                    justifyContent: "space-between",
                                  }}
                                >
                                  <div
                                    style={{
                                      display: "flex",
                                      alignItems: "center",
                                      gap: 10,
                                    }}
                                  >
                                    <div
                                      style={{
                                        width: 30,
                                        height: 30,
                                        borderRadius: "50%",
                                        background: "var(--green)",
                                        display: "flex",
                                        alignItems: "center",
                                        justifyContent: "center",
                                        fontSize: 11,
                                        fontWeight: 700,
                                        color: "#000",
                                        flexShrink: 0,
                                      }}
                                    >
                                      {initials(group.name || "?")}
                                    </div>
                                    <div>
                                      <div
                                        style={{
                                          fontWeight: 600,
                                          fontSize: 13,
                                          color: "var(--text)",
                                        }}
                                      >
                                        {group.name || "Unknown"}
                                      </div>
                                      <div
                                        style={{
                                          fontFamily: "var(--mono)",
                                          fontSize: 9,
                                          color: "var(--sub)",
                                        }}
                                      >
                                        {group.email || ""}
                                      </div>
                                    </div>
                                  </div>
                                  <div
                                    style={{
                                      background: "rgba(0,230,118,0.1)",
                                      border: "1px solid rgba(0,230,118,0.25)",
                                      borderRadius: 12,
                                      padding: "3px 10px",
                                      fontFamily: "var(--mono)",
                                      fontSize: 10,
                                      color: "var(--green)",
                                    }}
                                  >
                                    {group.reports.length} check-in
                                    {group.reports.length !== 1 ? "s" : ""}
                                  </div>
                                </div>
                                <div
                                  style={{
                                    display: "grid",
                                    gridTemplateColumns:
                                      "repeat(auto-fill,minmax(180px,1fr))",
                                    gap: 10,
                                    padding: 12,
                                  }}
                                >
                                  {group.reports.map((r) => (
                                    <div
                                      key={r._id}
                                      style={{
                                        background: "var(--s1)",
                                        border: "1px solid var(--border)",
                                        borderRadius: 8,
                                        overflow: "hidden",
                                      }}
                                    >
                                      <img
                                        src={r.imageUrl}
                                        alt="check-in"
                                        style={{
                                          width: "100%",
                                          height: 130,
                                          objectFit: "cover",
                                          display: "block",
                                          cursor: "zoom-in",
                                        }}
                                        onClick={() =>
                                          setSosLightbox(r.imageUrl)
                                        }
                                      />
                                      <div style={{ padding: "8px 10px" }}>
                                        <div
                                          style={{
                                            fontFamily: "var(--mono)",
                                            fontSize: 9,
                                            color: "var(--sub)",
                                            marginBottom: 2,
                                          }}
                                        >
                                          🕐 {fmtTime(r.createdAt)}
                                        </div>
                                        <div
                                          style={{
                                            fontFamily: "var(--mono)",
                                            fontSize: 9,
                                            color: "var(--sub)",
                                            marginBottom: r.note ? 4 : 6,
                                          }}
                                        >
                                          📍 {r.lat?.toFixed(4)},{" "}
                                          {r.lng?.toFixed(4)}
                                          <a
                                            href={`https://www.google.com/maps?q=${r.lat},${r.lng}`}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            style={{
                                              marginLeft: 5,
                                              color: "var(--blue)",
                                            }}
                                          >
                                            ↗
                                          </a>
                                        </div>
                                        {r.note && (
                                          <div
                                            style={{
                                              fontSize: 10,
                                              color: "var(--amber)",
                                              background:
                                                "rgba(255,171,0,0.07)",
                                              borderRadius: 4,
                                              padding: "3px 6px",
                                              marginBottom: 6,
                                              fontStyle: "italic",
                                            }}
                                          >
                                            "{r.note}"
                                          </div>
                                        )}
                                        <button
                                          onClick={() => deleteSos(r._id)}
                                          style={{
                                            width: "100%",
                                            background: "transparent",
                                            border: "1px solid var(--border2)",
                                            color: "var(--muted)",
                                            fontSize: 9,
                                            padding: "4px 0",
                                            borderRadius: 4,
                                            cursor: "pointer",
                                            fontFamily: "var(--mono)",
                                          }}
                                        >
                                          🗑 Delete
                                        </button>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })()}

                {/* Pincode tracking tab */}
                {activeTab === "pincodes" && (
                  <div className="ep-scroll">
                    <PincodeTrackingPanel
                      users={users}
                      liveUsers={liveUsers}
                      zones={zones}
                    />
                  </div>
                )}
              </div>

              {/* Lightbox */}
              {sosLightbox && (
                <div
                  onClick={() => setSosLightbox(null)}
                  style={{
                    position: "fixed",
                    inset: 0,
                    background: "rgba(0,0,0,0.92)",
                    zIndex: 9999,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    cursor: "zoom-out",
                  }}
                >
                  <img
                    src={sosLightbox}
                    style={{
                      maxWidth: "92vw",
                      maxHeight: "88vh",
                      borderRadius: 10,
                      boxShadow: "0 8px 50px rgba(0,0,0,.7)",
                    }}
                    alt="check-in full"
                  />
                </div>
              )}
            </main>

            {/* Toasts */}
            <div className="notif">
              {toasts.map((t) => (
                <div key={t.id} className={`n-item n-${t.type}`}>
                  {t.msg}
                </div>
              ))}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);
    </script>
  </body>
</html>
